# /workspace/_hooks.yaml — alpha-author bundle (ADR-296 v2 D2)
#
# Substrate-event wake source declarations. The substrate-event walker
# (services/wake_sources/substrate_event.py::walk_hooks) reads this file
# at every scheduler tick (~5 min), matches recent workspace_file_versions
# revisions against declared hooks, and submits a wake proposal per match.
#
# Per ADR-296 v2 D2, hooks are the sibling declarative shape to
# /workspace/_recurrences.yaml:
#   - Recurrences are the cron-tick wake source's configuration (time-driven)
#   - Hooks are the substrate-event wake source's configuration (event-driven)
# Both compose into the singular evaluation gate identically.
#
# Hook schema:
#   - slug:         stable identifier
#   - event:        "substrate_change" (today's only event type)
#   - path_match:   workspace-absolute glob pattern (fnmatch syntax)
#   - field_change: dict of frontmatter key → expected new value
#                   (hook fires ONLY on the transition into matched state,
#                    not on every write that preserves it)
#   - prompt:       what the Reviewer reads when the hook fires
#   - paused:       optional (default false)
#
# Per ADR-296 v2 D3 the Reviewer or operator both author hooks via the
# ManageHook primitive (CHAT_PRIMITIVES + REVIEWER_PRIMITIVES). Reviewer
# hook authoring is part of its cadence + standing-intent authority.

hooks:

  # ── pre-ship-audit — fire when a draft is marked ready_for_review ────────
  # Replaces the deleted pre-ship-audit recurrence (was reactive schedule:null
  # + FireInvocation chain pattern; that pattern dissolved with ADR-296 v2 D3).
  # The hook fires when /workspace/operation/authored/{piece-slug}/profile.md
  # frontmatter `status` transitions to `ready_for_review`. The transition
  # guard ensures the hook fires once per transition, not on every preserving
  # write.
  - slug: pre-ship-audit
    event: substrate_change
    path_match: /workspace/operation/authored/*/profile.md
    field_change:
      status: ready_for_review
    prompt: |
      A draft was just marked `ready_for_review`. Read the draft at
      /workspace/operation/authored/{piece-slug}/content.md (the same
      directory as the profile.md whose status transitioned — see
      `substrate_event_path` in your envelope), the operator's voice
      fingerprint at /workspace/operation/authored/_voice.md, the operator's
      editorial principles at /workspace/operation/authored/_editorial.md,
      and the recent corpus (most recently published pieces in
      /workspace/operation/authored/ excluding the draft itself).

      Audit the draft against:
        1. Voice fingerprint (per /workspace/operation/specs/voice-audit.md schema)
        2. Continuity with prior corpus (per /workspace/operation/specs/continuity-
           audit.md schema)
        3. Anti-AI-slop signature (subset of voice-audit — list-of-three
           openers, "It's worth noting", hedge stacks, adverb intensifiers,
           "in conclusion" markers)
        4. Editorial principle match (per _editorial.md "what gets shipped"
           criteria)
        5. Cadence context (is this on declared cadence, ahead, behind —
           read _preferences.yaml)

      Decide and emit verdict via ReturnVerdict — the framework requires
      a ReturnVerdict tool call to close the cycle. Text-only response
      without ReturnVerdict will be auto-converted to inert stand_down
      with no substrate write — that is a discipline failure, not a
      valid cycle close.

        - ReturnVerdict(verdict="approve", reasoning="<persona-voice
          summary>", confidence="high") — all checks pass; piece may
          ship. If _autonomy.yaml delegation is `bounded` AND piece_type
          matches ceiling_categories, this binds publication via
          ExecuteProposal. Otherwise approve surfaces to operator Queue.
        - ReturnVerdict(verdict="defer", reasoning="<persona-voice
          summary including specific defect path:line>",
          confidence="medium") — some checks pass, some need operator
          iteration. Also: WriteFile to /workspace/persona/judgment_log.md
          with structured defect (e.g., "para 3 sentence 2: hedge stack
          'I think it's worth considering'"). Operator iterates and
          resubmits.
        - ReturnVerdict(verdict="reject", reasoning="<persona-voice
          summary citing the violated principles.md rule>",
          confidence="high") — hard rejection rule fires per
          principles.md. Also: WriteFile to judgment_log.md with
          structured reasoning.

      Silent stand-down without writing audit reasoning is forbidden.

      AND update /workspace/persona/standing_intent.md with what you'll
      be watching for in the next pre-ship cycle per ADR-284 + principles.md
      "Default posture: audit, then act". Cite specific anti-patterns
      surfaced in this audit or, on a clean approve, what you'll be
      checking against next. Approving without an updated standing intent
      is not yet a closed judgment cycle.
    paused: false
