# /workspace/_recurrences.yaml — alpha-author bundle (ADR-261 D2 + ADR-263 D1 + ADR-275)
#
# Single canonical recurrences file. The operator can read the entire
# scheduled-work surface in 30 seconds. Per ADR-261 D1 each entry is
# {slug, schedule, mode, prompt} where:
#   - slug:     stable identifier
#   - schedule: plain UTC cron, or null (reactive — fires via FireInvocation)
#   - mode:     judgment (wakes Reviewer with prompt) | mechanical
#               (@primitive: ... directive; no Reviewer wake). Default at
#               parse time when absent: 'judgment' (legacy compat).
#   - prompt:   Reviewer message (judgment mode) OR @primitive: ... (mechanical)
#
# Per ADR-275: bundles ship substrate-maintenance + reactive triggers +
# capability specs only — judgment cadence (introspection, housekeeping,
# deliverable production) is Reviewer-authored from `_preferences.yaml`
# operator declarations + first-principled judgment. This file ships ONLY
# the reactive triggers and the substrate-maintenance recurrences the
# bundle commits to. Deliverable cadence (weekly-corpus-review, quarterly-
# voice-audit) lives in _preferences.yaml; the Reviewer authors actual
# Schedule(action="create") calls for those on its first wake.
#
# alpha-author does NOT use market-anchored semantic schedules (@market_*);
# the bundle is market-agnostic. Audience-bearing workspaces will gain
# mechanical track-* recurrences when ADR-283 step 2 ships the publishing-
# platform capabilities.

recurrences:

  # ── REACTIVE — pre-ship audit ───────────────────────────────────────────
  # ADR-296 v2 D2: pre-ship-audit recurrence DELETED. Migrated to
  # the substrate-event wake source — see /workspace/_hooks.yaml in
  # this bundle for the hook declaration. When a draft's profile.md
  # frontmatter `status` transitions to `ready_for_review`, the
  # substrate-event wake source fires a wake proposal with the
  # pre-ship-audit prompt as envelope.
  #
  # The reactive `schedule: null` + FireInvocation chain pattern dissolved
  # when the Reviewer lost self-invocation authority per ADR-296 v2 D3.
  # Substrate-event hooks are the sibling declarative shape (operator-
  # authored event-driven wake configuration).

  # ── JUDGMENT — corpus-coherence check ────────────────────────────────────
  # Periodic Reviewer pass to flag voice drift or continuity breaks
  # across the corpus. Distinct from pre-ship-audit (which is per-draft
  # before publication); corpus-coherence-check is cross-corpus and
  # post-publication. Surfaces drift that requires operator attention.
  - slug: corpus-coherence-check
    schedule: "0 12 * * 1,4"   # Mon + Thu at 12:00 UTC — twice-weekly cross-corpus pass
    mode: judgment
    required_capabilities: []
    prompt: |
      Assess the operation against its mandate — both the COHERENCE of what
      exists and whether the operation is PRODUCING what it owes.

      Coherence (when a corpus exists): aggregate voice-audit drift, cross-piece
      continuity, and cadence health across the published corpus
      (/workspace/operation/authored/{slug}/content.md, status=published;
      _voice.md fingerprint), and write the coherence slice to
      /workspace/operation/authored/_signal.md per
      /workspace/operation/specs/corpus-coherence-rollup.md.

      Production (always): your mandate's Expected Output is a STANDING
      OBLIGATION (governance/_expected_output.yaml + MANDATE ## Expected
      Output). An empty or flat corpus under a declared output contract is not
      a neutral fact — it is the obligation unmet, and you classify why
      (principles.md §2 owed-output rule: (A) quiet-world vs (B) no organ in
      your loop originates a piece). The rules of judgment for both — including
      whether to author a compose organ within your floor or surface the gap —
      are in principles.md; the frame owns how you close. Reason against your
      actual production state, not just the cleanliness of an existing corpus.
    display_name: "Corpus Coherence Check"

  # ── JUDGMENT — revision audit (long-arc author primary loop) ─────────────
  # ADR-283 step 2 — substrate enrichment for long-arc authorship.
  # The reactive pre-ship-audit loop assumes drafts progress through
  # ready_for_review toward publication. Long-arc workspaces (novel,
  # screenplay, book project) iterate on a single artifact over months
  # without flipping that flag. revision-audit is the Reviewer's lens for
  # that loop — periodic pass comparing current draft state against the
  # prior revision per ADR-209 chain. Spec: /workspace/operation/specs/revision-audit.md
  - slug: revision-audit
    schedule: "0 22 * * 5"   # Friday 22:00 UTC ≈ Friday afternoon US Pacific
    mode: judgment
    required_capabilities: []
    prompt: |
      Audit how in-progress drafts have changed over the audit window, and
      reason about your production state against the mandate.

      For each draft-state piece in /workspace/operation/authored/ with
      revisions in the window (window length per
      /workspace/governance/_preferences.yaml; default 7d), diff the revisions
      and audit the change against voice, entity continuity, structural
      load-bearing, and open-question state — per
      /workspace/operation/specs/revision-audit.md (the full procedure +
      schema). Write findings to /workspace/persona/judgment_log.md
      (audit_type: revision-audit) and update each draft's profile.md verdict.
      Revision audit observes; the ship gate is pre-ship-audit, and it does not
      write operator-canon.

      No drafts in window — or no drafts at all — is itself a fact about your
      production state, not a no-op: your Expected Output is a standing
      obligation (principles.md §2 owed-output rule). Reason against it; the
      frame owns how you close.
    display_name: "Revision Audit"

  # ── JUDGMENT — outcome reconciliation ────────────────────────────────────
  # Daily fold of the day's audit outcomes into _signal.md. Parallel
  # structurally to alpha-trader's outcome-reconciliation; alpha-author's
  # "outcomes" are audit decisions + ship/hold operator overrides +
  # revision-audit findings + operator-authored external_outcomes events.
  # ADR-283 D7 + Discovery note 2: alpha-author runs internal-coherence-
  # only — no audience-bearing capabilities ship in this bundle.
  - slug: outcome-reconciliation
    schedule: "0 5 * * *"   # 05:00 UTC daily — after most operator time zones' end-of-day
    mode: judgment
    required_capabilities: []
    prompt: |
      Fold the day's audit + ship + revision events into
      /workspace/operation/authored/_signal.md (rolling windows, by_piece_type,
      revision-audit summary, body narrative) and regenerate
      /workspace/operation/_signal_summary.md — per
      /workspace/operation/specs/corpus-coherence-rollup.md (the full schema +
      read list). Surface new operator-authored external_outcomes to
      feedback.md per ADR-181 when impact: high.

      Then reason, as the operation's standing judgment, about what the
      reconciled signal learned: does a calibration trajectory move your intent
      (a voice-audit trend nearing a threshold, a cadence slipping), and — given
      your Expected Output is a standing obligation — does your actual
      production against it warrant action (principles.md §2 owed-output rule)?
      Act on what the outcomes warrant. The frame owns how you close.
    display_name: "Outcome Reconciliation"

  # ── track-sources — the standing web/RSS watch (ADR-336 / ADR-335 D7) ────
  #
  # Mechanical, deterministic, zero-LLM. Fetches the operator-declared
  # sources (_sources.yaml; EMPTY = deliberate no-op — the lean
  # uploads+websearch shape stays valid, perception is a flow never a gate)
  # and distills them into _watch_signal.yaml per the ADR-335 D3 observation
  # contract (source_ref + attestation + observed_at + bounded entries).
  # Scheduled 30min before corpus-coherence-check's default window so
  # judgment reads a FRESH watch signal (the envelope carries watch_signal
  # per MANIFEST reviewer_wake_envelope). Judgment never fetches the web for
  # standing perception — it reads this substrate (substrate-aware,
  # transport-blind per ADR-335 D3).
  - slug: track-sources
    schedule: "30 11 * * *"   # daily 11:30 UTC — 30min before the coherence window
    mode: mechanical
    required_capabilities: []
    prompt: |
      @primitive: TrackWebSources(declaration="operation/authored/_sources.yaml", distills_to="operation/authored/_watch_signal.yaml")
    display_name: "Track Sources (standing watch)"

  # ── track-repo — the standing repository watch (ADR-335 Crawl-B / D4-D5) ──
  #
  # Mechanical, deterministic, zero-LLM. For an author workspace whose SUBJECT
  # is a code/doc repository: reads operator-declared repo file paths
  # (_repo_sources.yaml; EMPTY = deliberate no-op) through a watch-bound MCP
  # transport (the GitHub MCP server's get_file_contents) and distills them into
  # _repo_signal.yaml per the ADR-335 D3 observation contract (source_ref +
  # attestation + observed_at + bounded excerpt). Every foreign call routes
  # through the metered executor (read_foreign_tool → execution_events). Judgment
  # never calls the foreign server for perception — it reads this substrate +
  # each source_ref to author with VERIFIABLE citations to the exact repo path.
  # Scheduled before the compose/coherence windows so judgment reads a FRESH
  # repo signal. Distinct distills_to from track-sources (the two watches don't
  # collide on one signal file).
  - slug: track-repo
    schedule: "0 11 * * *"   # daily 11:00 UTC — before track-sources + the compose window
    mode: mechanical
    required_capabilities: []
    prompt: |
      @primitive: TrackForeign(declaration="operation/authored/_repo_sources.yaml", distills_to="operation/authored/_repo_signal.yaml", tool="get_file_contents")
    display_name: "Track Repo (standing repository watch)"

  # ── JUDGMENT — Reddit publish (ADR-353 §15a) ─────────────────────────────
  # The author archetype's publish half. The Reviewer decides WHETHER and WHAT
  # to post from the ready corpus — it is judgment, not a mechanical blast. The
  # actual platform_reddit_submit_post is consequential (external-write family,
  # ADR-307): under bounded/manual it QUEUEs for operator approval; under
  # autonomous it posts directly ("works while you sleep"). Reddit's culture
  # punishes anything that reads as automated/promotional — the contribution-
  # first ethic (would this be valuable if YARNNN didn't exist?) governs every
  # post. Only fires when a reddit platform_connection is active.
  - slug: reddit-publish
    schedule: "0 15 * * 2"   # Tue 15:00 UTC — one considered post per week, max
    mode: judgment
    required_capabilities: [write_reddit]
    prompt: |
      Consider whether the corpus has a piece worth publishing to Reddit this
      cycle. Read the recently-published corpus at
      /workspace/operation/authored/{piece-slug}/content.md (status=published)
      and the operator's voice fingerprint at /workspace/persona/_voice.md.

      This is JUDGMENT, not a quota. Publish ONLY if there is a piece that
      genuinely contributes to a specific subreddit's discourse on its own
      terms. The contribution-first test is binding: would this post be valuable
      to that community if YARNNN did not exist? If no piece clears that bar this
      cycle, post nothing — silence is the correct output of a contribution-first
      loop, not a failure. Never manufacture a post to satisfy cadence.

      If a piece clears the bar:
        - choose the subreddit whose audience the piece actually serves
        - adapt the title + body to that subreddit's culture (NOT a raw cross-
          post; Reddit punishes copy-paste promotion)
        - call platform_reddit_submit_post(subreddit=..., title=..., text=...)
        - record the post (subreddit, post_id, piece-slug) under
          /workspace/operation/authored/_audience/reddit/ for the perceive loop

      Engagement is something you will MEASURE (the reddit-perceive recurrence),
      never something you optimize toward. The corpus compounds on coherence,
      not on what gets upvoted (measure-not-steer).
    display_name: "Reddit Publish"

  # ── JUDGMENT — Reddit perceive (the outcomes-in / measure half) ──────────
  # The load-bearing half: read comments on recent Reddit posts and fold them
  # into audience_signal as OBSERVATION. This is what closes the loop (post →
  # measure reception → corpus learns) and what makes publishing valid for the
  # author archetype. Engagement INFORMS the corpus (what landed, what didn't,
  # what questions readers raised) but NEVER drives it toward engagement-
  # chasing — the bright line vs the alpha-creator archetype (ADR-353 §14).
  - slug: reddit-perceive
    schedule: "0 16 * * 4"   # Thu 16:00 UTC — ~2 days after the Tue publish window
    mode: judgment
    required_capabilities: [read_reddit]
    prompt: |
      Read reception on recently-published Reddit posts. For each post recorded
      under /workspace/operation/authored/_audience/reddit/ in the last 14 days,
      call platform_reddit_get_post_comments(post_id=...) and read the comment
      thread.

      Fold what you observe into the audience-signal slice of
      /workspace/operation/authored/_signal.md per the corpus-coherence-rollup
      schema: what resonated, what was contested, what questions recurred, where
      the piece was misread.

      This is OBSERVATION, not optimization. Surface what the audience reflected
      back about the corpus — it informs the operator's authoring and the
      Reviewer's coherence audits. It does NOT become a directive to write more
      of what gets upvoted. If a comment thread reveals a genuine gap or
      misreading in the corpus, that is a coherence finding to surface (measure-
      not-steer); the corpus still compounds on its own coherence.
    display_name: "Reddit Perceive"

  # ── JUDGMENT — Hacker News perceive (ADR-353 §17, zero-credential) ───────
  # The zero-friction perceive read: search HN for the corpus's topics + read the
  # discourse. Two purposes: (1) world-mirror — what is HN saying about the themes
  # the corpus argues (competing theses, reception of adjacent work); (2) Show HN
  # reception — if a piece was posted to HN (manual, per content strategy), read
  # its thread. Folds into audience_signal as OBSERVATION (measure-not-steer §14):
  # informs the corpus about how its themes land in the wild; never steers it
  # toward what gets upvoted. No connection required (NO_AUTH).
  - slug: hn-perceive
    schedule: "0 17 * * 1"   # Mon 17:00 UTC — weekly discourse scan
    mode: judgment
    required_capabilities: [read_hackernews]
    prompt: |
      Perceive the Hacker News discourse on the themes the corpus argues. Read the
      operator's voice/positioning at /workspace/persona/_voice.md and the recent
      corpus to know which themes matter, then:

        - platform_hackernews_search_posts(query=<a theme/keyword the corpus owns>)
          for the 1-3 themes most central to the corpus this period.
        - For the most relevant / highest-engagement results, platform_hackernews_
          get_item(item_id=...) to read the discussion.

      Fold what you observe into the audience-signal slice of
      /workspace/operation/authored/_signal.md per the corpus-coherence-rollup
      schema: how the corpus's themes are being discussed in the wild, competing
      framings, reception of adjacent work, gaps the discourse reveals.

      This is OBSERVATION (world-mirror), not optimization. It informs the
      operator's authoring and the Reviewer's coherence audits — it does NOT
      become a directive to chase HN-popular topics. A genuine gap or counter-
      argument the discourse surfaces is a coherence finding to consider, not a
      mandate to rewrite toward the crowd (measure-not-steer). What you do when
      the discourse is quiet on the corpus's themes is your judgment, not this
      prompt's to script.
    display_name: "Hacker News Perceive"

# ADR-275: weekly-corpus-review and quarterly-voice-audit (operator
# deliverable cadence) live in /workspace/governance/_preferences.yaml.
# The Reviewer reads _preferences.yaml at every wake and authors Schedule(
# action="create"|"update"|"archive") for declared preferences. Specs at
# /workspace/operation/specs/weekly-corpus-review.md + quarterly-voice-audit.md are
# the Claude Code skills.md analog.

# ADR-283 step 2 will add mechanical track-* recurrences for audience-
# bearing capabilities (track-linkedin, track-x, track-newsletter). These
# will follow alpha-trader's track-positions / track-account / track-orders
# pattern — @primitive: SyncPlatformState() directives that mirror external
# state into substrate at known cadence. The bundle ships these as
# `mode: mechanical` recurrences once the corresponding write_* capabilities
# are shipped per ADR-283 lean dependencies.
