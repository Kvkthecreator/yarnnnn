schema_version: 1

# alpha-author composition manifest. Read by the compositor (ADR-225;
# ADR-312 renamed the cockpit composition key → home). Speaks ADR-198
# archetypes × ADR-214 4-tab nav.
#
# All bindings are filesystem paths. Components must exist in the system
# component library (web/components/library/) at compositor render time.
#
# ADR-283 patched D8: the four-face kernel pattern was dissolved by
# ADR-273 Phase 2. alpha-author follows alpha-trader's precedent —
# program-specific section composition via the home.program_sections
# binding (ADR-312 D2), no kernel-imposed face floor.
#
# The Author* section components are implemented at
# web/components/library/programs/alpha-author/ and registered in
# web/components/library/registry.tsx — so an activated alpha-author
# workspace renders this four-section Home stack below the kernel-general
# Constitution band + the kernel-universal slots (decision queue, recent
# artifacts, judgment trail) per ADR-312.

tabs:
  work:
    list:
      pinned_tasks: [pre-ship-audit, weekly-corpus-review]
      group_default: output_kind
      filters_default:
        output_kind: produces_deliverable

      # Six-slot contract (ADR-312 D2 + 2026-06-04 amendment): a program
      # declares exactly TWO slots — the ground-truth hero (#2) and the
      # entity list (#4). The kernel owns the other four (#1 constitution,
      # #3 decision queue, #5 recent artifacts, #6 judgment trail) and
      # renders them itself. A program does NOT re-render the mandate or
      # sprawl into a metric stack (the former 4-card AuthorMandate /
      # Corpus / Voice / Pipeline did both and read as an incoherent
      # dashboard).
      #
      # For an author:
      #   - hero  (#2, "is this working?")  → AuthorHero — does my shipped
      #     writing still sound like me? Voice consistency is the headline;
      #     coherence + audit volume are quiet support.
      #   - entities (#4, "what's in play?") → AuthorPieces — the corpus
      #     pieces, newest first, with their state.
      home:
        program_sections:
          - kind: AuthorHero            # slot #2 — ground-truth hero (voice consistency)
            order: 1
          - kind: AuthorPieces          # slot #4 — entity list (corpus pieces)
            order: 2

    # No detail middles. Per ADR-228 the bundle-shaped specifics for
    # alpha-author (corpus state, voice consistency, pipeline) live
    # inside the cockpit's faces — that is where the operator runs the
    # operation. /work detail mode is forensics: "show me the latest
    # output" — kernel-default DeliverableMiddle handles that for
    # pre-ship-audit and weekly-corpus-review the same as every other
    # produces_deliverable task.

  agents:
    list:
      featured: [reviewer]
    reviewer:
      principles_default: reference-workspace/review/principles.md

  context:
    list:
      featured_domains: [authored, audience]

chat_chips:
  - "Audit this draft for voice drift"
  - "What's the corpus signal saying?"
  - "Did I ship on cadence this week?"
  - "Walk me through continuity threads"

phase_overlays:
  accumulation:
    tabs:
      work:
        list:
          banner: "Phase 0 — Accumulation. Author MANDATE + voice fingerprint + first 30 days of corpus. AUTONOMY manual."
  cadence_discipline:
    tabs:
      work:
        list:
          banner: "Phase 1 — Cadence Discipline. 60-day shipping window. AUTONOMY bounded."
  selective_autonomy:
    tabs:
      work:
        list:
          banner: "Phase 2 — Selective Autonomy. Reviewer pre-ship audits consultative; auto-approve carve-outs per principles.md."
  corpus_compounds:
    tabs:
      work:
        list:
          banner: "Phase 3 — Corpus Compounds. Substrate moat structurally real, not just claimed."
