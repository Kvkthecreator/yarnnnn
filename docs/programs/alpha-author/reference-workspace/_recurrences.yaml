# /workspace/_recurrences.yaml — alpha-author bundle (ADR-261 D2 + ADR-263 D1 + ADR-275)
#
# Single canonical recurrences file. The operator can read the entire
# scheduled-work surface in 30 seconds. Per ADR-261 D1 each entry is
# {slug, schedule, mode, prompt} where:
#   - slug:     stable identifier
#   - schedule: plain UTC cron, or null (reactive — fires via FireInvocation)
#   - mode:     judgment (wakes Reviewer with prompt) | mechanical
#               (@primitive: ... directive; no Reviewer wake). Default at
#               parse time when absent: 'judgment' (legacy compat).
#   - prompt:   Reviewer message (judgment mode) OR @primitive: ... (mechanical)
#
# Per ADR-275: bundles ship substrate-maintenance + reactive triggers +
# capability specs only — judgment cadence (introspection, housekeeping,
# deliverable production) is Reviewer-authored from `_preferences.yaml`
# operator declarations + first-principled judgment. This file ships ONLY
# the reactive triggers and the substrate-maintenance recurrences the
# bundle commits to. Deliverable cadence (weekly-corpus-review, quarterly-
# voice-audit) lives in _preferences.yaml; the Reviewer authors actual
# Schedule(action="create") calls for those on its first wake.
#
# alpha-author does NOT use market-anchored semantic schedules (@market_*);
# the bundle is market-agnostic. Audience-bearing workspaces will gain
# mechanical track-* recurrences when ADR-283 step 2 ships the publishing-
# platform capabilities.

recurrences:

  # ── REACTIVE — pre-ship audit ───────────────────────────────────────────
  # ADR-296 v2 D2: pre-ship-audit recurrence DELETED. Migrated to
  # the substrate-event wake source — see /workspace/_hooks.yaml in
  # this bundle for the hook declaration. When a draft's profile.md
  # frontmatter `status` transitions to `ready_for_review`, the
  # substrate-event wake source fires a wake proposal with the
  # pre-ship-audit prompt as envelope.
  #
  # The reactive `schedule: null` + FireInvocation chain pattern dissolved
  # when the Reviewer lost self-invocation authority per ADR-296 v2 D3.
  # Substrate-event hooks are the sibling declarative shape (operator-
  # authored event-driven wake configuration).

  # ── JUDGMENT — corpus-coherence check ────────────────────────────────────
  # Periodic Reviewer pass to flag voice drift or continuity breaks
  # across the corpus. Distinct from pre-ship-audit (which is per-draft
  # before publication); corpus-coherence-check is cross-corpus and
  # post-publication. Surfaces drift that requires operator attention.
  - slug: corpus-coherence-check
    schedule: "0 12 * * 1,4"   # Mon + Thu at 12:00 UTC — twice-weekly cross-corpus pass
    mode: judgment
    required_capabilities: []
    prompt: |
      Read the operator's voice fingerprint at /workspace/operation/authored/
      _voice.md and the recent corpus (pieces published in the last
      30 days at /workspace/operation/authored/{piece-slug}/content.md
      with status=published).

      Audit for:
        1. Voice fingerprint drift: aggregate voice-audit results across
           recent pieces; flag if ≥30% show drift on the same anti-pattern
           per /workspace/persona/_principles.yaml::high_impact_voice_drift_
           recent_pieces threshold.
        2. Cross-piece continuity break: pairwise continuity check across
           recent corpus; flag any unacknowledged contradiction.
        3. Cadence health: read /workspace/governance/_preferences.yaml;
           compute days-since-last-ship per cadence; flag if 2+ intervals
           missed (per /workspace/persona/_principles.yaml::high_impact_
           cadence_intervals_missed threshold).

      Write findings to /workspace/operation/authored/_signal.md (coherence
      slice) per /workspace/operation/specs/corpus-coherence-rollup.md schema.

      When findings cross high-impact thresholds: emit Clarify proposals
      to operator surfacing the specific drift/break/missed cadence with
      pointers to the affected substrate, then ReturnVerdict(verdict=
      "defer", reasoning="<persona-voice naming the specific drift>",
      confidence="high").

      Otherwise: WriteFile /workspace/persona/standing_intent.md with
      what corpus drift patterns you're watching for per ADR-284 +
      principles.md "Default posture". Cite specific anti-patterns
      trending up across recent pieces (e.g., "Watching for cadence
      drift — last 3 weeks ran on-cadence but interval is widening;
      2 more weeks of widening crosses the 2-interval threshold").
      THEN ReturnVerdict(verdict="stand_down", reasoning="<persona-voice
      noting no findings crossed thresholds + what you're watching for>",
      confidence="medium"). The material-outcome gate (ADR-281 §5)
      decides whether a judgment_log.md entry is rendered;
      standing_intent.md update is unconditional. Text-only "no findings"
      response without ReturnVerdict is forbidden — the cycle does not
      close cleanly without it.
    display_name: "Corpus Coherence Check"

  # ── JUDGMENT — revision audit (long-arc author primary loop) ─────────────
  # ADR-283 step 2 — substrate enrichment for long-arc authorship.
  # The reactive pre-ship-audit loop assumes drafts progress through
  # ready_for_review toward publication. Long-arc workspaces (novel,
  # screenplay, book project) iterate on a single artifact over months
  # without flipping that flag. revision-audit is the Reviewer's lens for
  # that loop — periodic pass comparing current draft state against the
  # prior revision per ADR-209 chain. Spec: /workspace/operation/specs/revision-audit.md
  - slug: revision-audit
    schedule: "0 22 * * 5"   # Friday 22:00 UTC ≈ Friday afternoon US Pacific
    mode: judgment
    required_capabilities: []
    prompt: |
      Periodic revision audit on in-progress drafts. Per
      /workspace/operation/specs/revision-audit.md schema.

      Read /workspace/governance/_preferences.yaml to determine the
      audit window length for this workspace (default 7 days for the
      Friday-weekly cadence; operator may have tuned per-piece-type via
      _preferences.yaml).

      Procedure:
        1. List all draft-state pieces in /workspace/operation/authored/
           (status: draft per piece profile.md).
        2. For each draft, ListRevisions on content.md within the audit
           window.
        3. For each draft with >= 1 revision in window:
           - ReadRevision at window-start + current head.
           - DiffRevisions to surface what changed.
           - Audit the diff against:
             a. Voice fingerprint (_voice.md anti-patterns; universal
                anti-slop baseline)
             b. Entity continuity (entities/{slug}.md What's been
                established for entities the diff touches per
                /workspace/operation/specs/entity-continuity.md)
             c. Structural load-bearing (passages other passages depend
                on that shifted)
             d. Open-question state (implicit closes of entity What's
                open without acknowledgment)
        4. Write findings to /workspace/persona/judgment_log.md with
           audit_type: revision-audit.
        5. Update each audited draft's profile.md with last_revision_audit
           timestamp + revision_audit_state verdict.
        6. When verdict is `concerning-drift` (or `notable-changes` if
           operator opted into surfacing per _preferences.yaml): emit
           Clarify proposal to operator with specific findings, then
           ReturnVerdict(verdict="defer", reasoning="<persona-voice
           naming the drift trajectory + affected drafts>",
           confidence="high").
        7. When no drafts have revisions in window: write one-line
           `stand_down: no drafts in window` entry to judgment_log.md,
           THEN ReturnVerdict(verdict="stand_down", reasoning="<persona-
           voice noting no drafts active + what you're watching for once
           authorship resumes>", confidence="medium"). No Clarify, no
           noise — but ReturnVerdict still required to close the cycle.

      Revision audit is observational — it surfaces patterns. It does NOT
      enforce (the gate is pre-ship-audit). It does NOT write to
      operator-canon (_voice.md, _editorial.md, _entities.md). Findings
      surface via Clarify for operator authoring.

      AND update /workspace/persona/standing_intent.md with what trajectory
      patterns you're watching for across in-progress drafts per ADR-284 +
      principles.md "Default posture". Cite specific drafts + the
      trajectory dimension (e.g., "Watching for entity-continuity break
      on screenplay-act-2 — Sarah's stoicism softened in last 3 revisions,
      next revision crossing into emotional outburst would contradict
      established arc"). A no-drafts-in-window stand-down still updates
      standing_intent.md with what would be watched once authorship
      resumes. Text-only response without ReturnVerdict is forbidden in
      every exit branch.
    display_name: "Revision Audit"

  # ── JUDGMENT — outcome reconciliation ────────────────────────────────────
  # Daily fold of the day's audit outcomes into _signal.md. Parallel
  # structurally to alpha-trader's outcome-reconciliation; alpha-author's
  # "outcomes" are audit decisions + ship/hold operator overrides +
  # revision-audit findings + operator-authored external_outcomes events.
  # ADR-283 D7 + Discovery note 2: alpha-author runs internal-coherence-
  # only — no audience-bearing capabilities ship in this bundle.
  - slug: outcome-reconciliation
    schedule: "0 5 * * *"   # 05:00 UTC daily — after most operator time zones' end-of-day
    mode: judgment
    required_capabilities: []
    prompt: |
      Reconcile the day's audit + ship + revision events into _signal.md
      per /workspace/operation/specs/corpus-coherence-rollup.md schema.

      Read:
        - /workspace/persona/judgment_log.md — today's audit verdicts (pre-
          ship-audit, corpus-coherence-check, revision-audit, entity-
          continuity findings) with reasoning.
        - Workspace file revisions per ADR-209 for /workspace/operation/
          authored/ — pieces shipped today, drafts iterated today.
        - Existing /workspace/operation/authored/_signal.md::external_outcomes
          frontmatter — operator-authored sparse events; surface any
          new-since-last-reconciliation entries to feedback.md per ADR-181
          when impact: high.

      Fold into /workspace/operation/authored/_signal.md:
        - Frontmatter rolling 7d/30d/90d windows of audit-correct rate,
          ship-rate, voice-flag-rate, continuity-flag-rate, entity-
          continuity-flag-rate.
        - by_piece_type per-category windows (newsletter, essay, post,
          etc.).
        - Revision-audit summary block — drafts audited in window,
          notable-changes count, concerning-drift count.
        - Audience-signal block stays empty by design — alpha-author runs
          internal-coherence-only.
        - Body narrative: today's notable verdicts, drift signals,
          cadence state, recent external_outcomes entries.

      Regenerate /workspace/operation/_signal_summary.md as the cross-domain
      rollup the daily-update briefing reads.

      Close the cycle: WriteFile /workspace/persona/standing_intent.md with
      what calibration patterns you're watching for per ADR-284 +
      principles.md "Default posture". Cite specific calibration
      trajectories (e.g., "Watching voice-audit accuracy 30d trend —
      current 0.74, drifting down from 0.82 a month ago; if it crosses
      0.65 the voice-audit thresholds need a Clarify to operator").
      THEN ReturnVerdict(verdict="stand_down", reasoning="<persona-voice
      summary of today's reconciliation + what you're watching for>",
      confidence="medium") — required even when no audit or ship events
      fired in the window. The material-outcome gate decides whether
      feedback.md routing occurs; standing_intent.md update is
      unconditional; ReturnVerdict is the cycle-close contract. Text-only
      "no events" response is forbidden — a closed cycle is named, not
      implied.
    display_name: "Outcome Reconciliation"

# ADR-275: weekly-corpus-review and quarterly-voice-audit (operator
# deliverable cadence) live in /workspace/governance/_preferences.yaml.
# The Reviewer reads _preferences.yaml at every wake and authors Schedule(
# action="create"|"update"|"archive") for declared preferences. Specs at
# /workspace/operation/specs/weekly-corpus-review.md + quarterly-voice-audit.md are
# the Claude Code skills.md analog.

# ADR-283 step 2 will add mechanical track-* recurrences for audience-
# bearing capabilities (track-linkedin, track-x, track-newsletter). These
# will follow alpha-trader's track-positions / track-account / track-orders
# pattern — @primitive: SyncPlatformState() directives that mirror external
# state into substrate at known cadence. The bundle ships these as
# `mode: mechanical` recurrences once the corresponding write_* capabilities
# are shipped per ADR-283 lean dependencies.
