schema_version: 1

# alpha-trader composition manifest. Read by the compositor
# (ADR-225 Phase 1+2 shipped; ADR-312 renamed the cockpit composition
# key → home — the program declares the Home's composed slots here).
# Speaks ADR-198 archetypes (Document/Dashboard/Queue/Briefing/Stream)
# × ADR-214 4-tab nav (chat/work/agents/files).
#
# All bindings are filesystem paths. Components must exist in the
# system component library (web/components/library/) at compositor
# render time.

tabs:
  work:
    list:
      pinned_tasks: [trading-signal, portfolio-review]
      group_default: output_kind
      filters_default:
        output_kind: produces_deliverable

      # ADR-435 (2026-07-10): the `home.program_sections` program cockpit
      # (the seven-section trader stack: TraderRegime/Portfolio/MoneyTruth/
      # Expectancy/Positions/Signals/Orders) is DELETED with the Home surface.
      # The program's live state (positions, balances, signals, orders) is read
      # through its substrate on its own mirror surfaces + /work detail middles;
      # there is no composed program front page. The component files were removed.

    # No detail middles. Per ADR-228 the bundle-shaped specifics for
    # alpha-trader (positions, risk gauge, performance attribution,
    # proposal queue) live inside the cockpit's four faces — that is
    # where the operator runs the operation. /work detail mode is
    # forensics: "show me the latest output" — kernel-default
    # DeliverableMiddle handles that for portfolio-review and
    # trading-signal the same as every other produces_deliverable task.
    #
    # If the operator wants the rich Alpaca-shaped read (live equity,
    # buying power, day P&L, open positions), the cockpit's MoneyTruth
    # face (Commit 3) and Tracking face's operational state region
    # (Commit 4) are the surface for it.

  agents:
    list:
      featured: [trading-bot, reviewer]
    reviewer:
      principles_default: reference-workspace/persona/principles.md

  context:
    list:
      featured_domains: [trading, portfolio]

chat_chips:
  - "Walk me through today's signals"
  - "What's my risk budget right now?"
  - "Did anything trigger overnight?"
  - "Show me last week's expectancy by signal"

phase_overlays:
  observation:
    tabs:
      work:
        list:
          banner: "Paper-only. Live trading gated on AUTONOMY.md flip."
  paper_discipline:
    tabs:
      work:
        list:
          banner: "Phase 1 — Paper Discipline. 90-day process-obedience window."
  live_float:
    tabs:
      work:
        list:
          banner: "Phase 2 — Live Float. Every order requires Reviewer approval."
  calibrated_autonomy:
    tabs:
      work:
        list:
          banner: "Phase 3 — Calibrated Autonomy. Selective auto-approval active per principles.md."
  self_funding:
    tabs:
      work:
        list:
          banner: "Phase 4 — Self-Funding Validated."
