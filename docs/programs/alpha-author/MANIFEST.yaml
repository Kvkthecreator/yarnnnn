  # MANDATE template lives in this bundle's reference-workspace per ADR-230 D2:
  - docs/programs/alpha-author/reference-workspace/constitution/MANDATE.md
  - docs/adr/ADR-194-reviewer-layer.md
  - docs/adr/ADR-217-autonomy-delegation.md
  - docs/adr/ADR-222-agent-native-operating-system-framing.md
  - docs/adr/ADR-223-program-bundle-specification.md
  - docs/adr/ADR-230-persona-program-registry-unification.md
