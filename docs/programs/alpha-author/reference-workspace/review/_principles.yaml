# _principles.yaml — machine-parsed Reviewer thresholds (ADR-254 + ADR-181)
# Read by review_policy.load_principles() via yaml.safe_load.
# For the Reviewer's full rule-set + reasoning framework, see principles.md.
#
# ---
# Runtime contract (per api/services/review_policy.py::load_principles +
# _validate_principles_block, verified 2026-05-28):
#
#   - Loaded as domain-keyed dict; only `high_impact_threshold_cents` is
#     extracted per domain (cast to int).
#   - All other keys are loaded into the parsed dict but consumed by NO
#     downstream caller in api/.
#
# Per ADR-305 §8 + the rewrite posture: this file holds ONLY the runtime
# contract. Rule-level numeric thresholds (sample sizes for ship-binding
# bootstrap, drift % for voice-fingerprint-corpus-drift, intervals for
# cadence-on-pace, etc.) live INLINE in principles.md rule declarations
# until e2e measurement (ADR-305 Piece 3) shows whether prose-inline is
# sufficient or whether moving them to yaml + an envelope-plumbing change
# is warranted.
#
# That choice is downstream of measurement, not paper-design. Don't
# pre-populate this file with thresholds that no code reads — the dead
# substrate that triggered the rewrite in the first place was a file
# carrying values it called itself authoritative on that nothing read.
# ---

default:
  # ADR-181 high-impact outcome routing threshold for alpha-author.
  # Format: cents (ADR-254 numeric discipline — int, not string).
  #
  # Loop-cycle reasoning (per ADR-305 D2 M5 cite-the-loop-cycle
  # discipline): alpha-author is a slow ship-loop (operator publishes
  # 1-2 pieces per week in steady state). Each ship-decision produces
  # at most one direct revenue-attributable outcome event (when audience-
  # bearing) plus the operator's own ship/hold telemetry. "High-impact"
  # at this loop-cycle is an outcome event the operator should
  # personally see — a $50 capital-equivalent threshold is appropriate
  # for distinguishing background-noise outcomes from operator-attention-
  # worthy ones at this program's economic scale. (Numeric placeholder
  # until the program's actual outcome distribution accumulates enough
  # to calibrate against; first revision when operator has >=10 ship-
  # decisions with outcome data accrued.)
  #
  # last-recalibrated: 2026-05-28 (initial bundle value)
  high_impact_threshold_cents: 5000
