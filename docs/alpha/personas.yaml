# Alpha-1 Persona Registry
#
# Single source of truth for who each alpha persona is and where their state
# lives. No secrets belong in this file — credentials live in
# api/.env.alpha-ops (gitignored, see docs/alpha/OPERATOR-HARNESS.md
# §"Where secrets live").
#
# Both KVK and Claude read this file to know which workspace to act on.
# Any persona added here is callable via scripts/alpha_ops/*.py by slug.
#
# ADR-230 (2026-04-28): every persona row MUST declare a `program: <slug>`
# field whose target bundle exists at docs/programs/{program}/. Validated
# at load_registry() time. The persona slug and the program slug are
# independent — alpha-trader and alpha-trader-2 both run program=alpha-
# trader. Activation = `_fork_reference_workspace(persona.user_id,
# persona.program)` — same primitive as real-operator activation per
# ADR-226. The parallel scaffold path (scripts/alpha_ops/scaffold_trader.py)
# was DELETED by ADR-230 D5; activate_persona.py is the harness entry
# point post-ADR-230.
#
# ADR-231 (2026-04-28→29): the `tasks` table is a thin scheduling index;
# the `essential` and `mode` columns were dropped by migration 164. The
# legacy invariant fields `essential_tasks` and `active_bots` retired:
#   - essential_tasks  → scaffolded_recurrences (presence + active + !paused)
#   - active_bots      → active_roles (Platform Bots dissolved per ADR-205;
#                        platform capability now binds to platform_connections,
#                        not an agent row)
#
# ADR-261/262 (2026-05-10): all per-shape declaration files dissolved
# into single canonical /workspace/_recurrences.yaml. The bundle's
# _recurrences.yaml ships universal slugs (no -2 suffix). Per-operator
# disambiguation happens at the user_id row in the `tasks` index, not
# at the slug level. Back-office-* prefix retired:
#   back-office-narrative-digest        → narrative-digest
#   back-office-outcome-reconciliation  → outcome-reconciliation
#   back-office-proposal-cleanup        → proposal-cleanup
#   back-office-reviewer-calibration    → morning-calibration
#   back-office-reviewer-reflection     → morning-reflection
# Three new mechanical mirrors added (track-account, track-orders,
# track-positions per ADR-264). /workspace/_shared/back-office.yaml
# file deleted by ADR-261 D2 — substrate is one flat file now.
#
# Last confirmed against DB: 2026-05-11

version: 1

supabase:
  url: https://noxgqcwynkzqabljjyon.supabase.co
  # SUPABASE_SERVICE_KEY lives in env (docs/database/ACCESS.md for value)

api:
  prod_base_url: https://yarnnn-api.onrender.com
  # JWTs are short-lived (1h); mint fresh via scripts/alpha_ops/mint_jwt.py

personas:

  - slug: alpha-trader
    label: "Simons-inspired systematic retail trader"
    program: alpha-trader   # ADR-230 D1: bundle at docs/programs/alpha-trader/
    email: seulkim88@gmail.com
    user_id: 2be30ac5-b3cf-46b1-aeb8-af39cd351af4
    workspace_id: b7e1b9bc-ffb3-478e-bd05-dcae01a8a6b1
    platform:
      kind: trading
      provider: alpaca
      mode: paper           # paper | live — alpha stays paper through Phase 2
      account_suffix: X4DJ  # last 4 of Alpaca account number, for sanity-check
    context_domains:
      # Activation-time invariant only — verify.py checks at least one
      # file exists under /workspace/context/{domain}/. The bundle ships
      # `trading/` populated; `portfolio/` and `signals/` are
      # accumulation domains that fill from work (track-account /
      # track-orders / track-positions / signal-evaluation recurrences
      # once Alpaca is connected). They are not asserted as scaffolded
      # invariants; they emerge.
      - trading
    # Exact cred env-var names the connect script reads.
    # Values live in api/.env.alpha-ops (gitignored).
    credentials_env:
      api_key:    ALPHA_TRADER_ALPACA_KEY
      api_secret: ALPHA_TRADER_ALPACA_SECRET
    # Invariants that verify.py checks on this persona.
    expected:
      agent_count: 1   # YARNNN only at activation (specialists lazy-create on dispatch per ADR-205)
      active_roles: [thinking_partner]
      # Post-ADR-261: every recurrence is one entry in the single
      # canonical /workspace/_recurrences.yaml file. Slugs are universal
      # (no persona suffix) — per-operator scoping is via user_id in the
      # `tasks` scheduling index.
      # ADR-275 (2026-05-14): 7 judgment-cadence recurrences deleted —
      # bundles ship only substrate-maintenance + reactive + event-anchored
      # heartbeats. Reviewer authors introspection / housekeeping /
      # deliverable cadence from first-principled judgment. Operator
      # preferences for deliverable cadence in /workspace/constitution/
      # _preferences.yaml; Reviewer reads and authors Schedule accordingly.
      scaffolded_recurrences:
        - outcome-reconciliation         # judgment-mode but substrate-maint (post-close reconciler)
        - signal-evaluation              # @market_open + 15min — operator-declared trading heartbeat
        - track-universe                 # mechanical (ADR-271 Thread A)
        - track-regime                   # mechanical (ADR-271 Thread A)
        - track-account                  # mechanical (ADR-264)
        - track-orders                   # mechanical (ADR-264)
        - track-positions                # mechanical (ADR-264)
        - trade-proposal                 # reactive (no schedule)
      platform_connections: 1
      core_files:
        - /workspace/_recurrences.yaml   # ADR-261 D2: single canonical recurrence declaration substrate
        - /workspace/persona/IDENTITY.md
        - /workspace/constitution/MANDATE.md
        - /workspace/governance/AUTONOMY.md
        - /workspace/operation/BRAND.md
        - /workspace/operation/CONVENTIONS.md
        - /workspace/governance/_preferences.yaml    # ADR-275 operator deliverable cadence prefs
        - /workspace/operation/trading/_operator_profile.md
        - /workspace/operation/trading/_risk.md
        - /workspace/persona/principles.md
        - /workspace/persona/OCCUPANT.md   # ADR-284: runtime-truth-aligned seat occupant declaration (kernel-scaffolded by workspace_init Phase 5; bundle-fork overwrites via _populate_occupant_for_runtime with ai:reviewer-sonnet-v8 for current alpha state)
      # ADR-284: standing_intent.md is NOT a signup-invariant core_file — it
      # materializes only after the Reviewer's first judgment-mode cycle
      # writes it (Reviewer is the single writer per the reviewer-workbench
      # role / ADR-281 §3). Post-first-Reviewer-cycle invariant lives in
      # observation discipline, not in verify.py's signup-time checks.
      occupant_attribution:                # ADR-284 D3: substrate-runtime alignment check
        # OCCUPANT.md frontmatter must declare AI occupant post-bundle-fork
        # (current alpha state — AI runs the seat per FOUNDATIONS Axiom 2
        # v8.4). Detects substrate-runtime drift where the bundle scaffold's
        # `human` default leaks past bundle-fork overwrite.
        expected_occupant_class: ai
        expected_occupant_prefix: "ai:reviewer-sonnet-"
      risk_md_path: /workspace/operation/trading/_risk.md

