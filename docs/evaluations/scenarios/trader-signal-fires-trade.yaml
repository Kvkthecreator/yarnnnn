scenario_schema_version: 1
scenario: trader-signal-fires-trade
description: |
  JUDGMENT-AXIS read (EVAL-SUITE-DISCIPLINE §0): when signal-evaluation
  fires against a ticker snapshot that genuinely satisfies a signal rule,
  does the Reviewer REASON the way a systematic trader would — recognize
  the match, attribute it to the right signal, size per the risk rule, and
  close the cycle with a verdict?

  AXIS BOUNDARY (read §0 before editing this file). This scenario reads the
  Reviewer's REASONING, not the trade mechanics. The deterministic chain —
  signal-detection-from-real-bars and proposal → gate → execute → Alpaca
  submit → pending→executed — is owned by the architecture-axis tests
  (`api/test_trading_pipeline_architecture.py` + `api/test_alpha_trader_
  pipeline_e2e.py`), where it is asserted green in CI. Do NOT try to observe
  "the trade fired" through this eval; that fact lives in the test. This
  eval asks only: given a clean signal situation, was the verdict
  editor-coherent?

  §0.2 fixture caveat (the seed is bounded-fragile, by necessity). The
  §0-correct way to produce a signal situation is to mock the input
  (`alpaca.get_bars`) and run the REAL `track-universe` so a genuine
  {TICKER}.yaml lands — but that is the architecture-test layer, not
  expressible in this YAML harness. Here we seed the snapshot directly,
  which the live `track-universe` RTH snapshots (@market_open+15 / midday /
  pre-close) can clobber. Mitigations: the filename is UPPERCASE NVDA.yaml
  matching `ticker.upper()` (the 2026-06-04 casing race — a lowercase seed
  landed where signal-evaluation never read it), the fields match the
  writer exactly (price/sma_*/rsi_14/atr_14/volume_20d_avg per
  specs/ticker-snapshot.md), and the eval is fired OUTSIDE RTH snapshot
  windows. A stand-down claiming "no match" is therefore a fixture finding
  (the seed got clobbered or the rule didn't actually fire), NOT a Reviewer
  gap — interpret accordingly.

  Construction (one clean match, NOT engineered-to-pass):
    - Seed NVDA.yaml as a snapshot that GENUINELY satisfies Signal 2
      (Mean-reversion-oversold) per _operator_profile.md:
        • RSI(14) < 25                          → rsi_14: 22.5
        • price within 5% of 200-day SMA        → price 180.20 vs sma_200 185.00 (2.6%)
        • not in confirmed downtrend            → sma_20 (195.10) > sma_50 (188.40)
      All values internally coherent (no incoherence — the Reviewer
      correctly rejected a malformed fixture in a prior run; this one is honest).
    - Seed _money_truth.md with positive Signal-2 expectancy so capital-EV
      reasoning lands (Signal-2 +0.31R over 18 samples, above the -0.5R
      decay guardrail).
    - fire track-account + track-regime so account + regime substrate is
      fresh and non-stale (the Reviewer rejects stale regime per Hard
      Rule #7).
    - fire signal-evaluation as the measured turn — THIS is the recurrence
      that reads NVDA.yaml, applies Signal-2's boolean rule, appends to
      signals/signal-2.yaml, and emits ProposeAction inline when it fires.

  The read (judgment, not mechanics): did the Reviewer recognize Signal 2,
  attribute it correctly, and produce a sized, stop-bearing verdict? A
  hard-rule reject/defer with the rule cited (sizing, regime freshness) is
  an equally coherent read. The cycle must CLOSE with a verdict either way
  (S9) — a NULL-token success row is the silent-wake fault, not a
  stand-down.

persona: kvk

setup:
  - fire: track-account
  - fire: track-regime

  # Defensively remove any stale lowercase shadow file. The 2026-06-04 run
  # seeded lowercase nvda.yaml while track-universe wrote UPPERCASE NVDA.yaml;
  # signal-evaluation reads UPPERCASE, so the lowercase seed was never read
  # AND lingered as a confusing shadow. Delete it before seeding so this
  # scenario can never be confused by a casing shadow regardless of history.
  - delete_substrate: /workspace/context/trading/nvda.yaml

  # Seed a coherent NVDA snapshot that genuinely satisfies Signal 2.
  # UPPERCASE filename + writer-exact fields (specs/ticker-snapshot.md);
  # see the §0.2 fixture caveat above for why this seed is bounded-fragile.
  - write_substrate:
      path: /workspace/context/trading/NVDA.yaml
      authored_by: operator-proxy:scenario-runner:acting-as-kvk
      content: |
        ticker: NVDA
        last_updated: 2026-06-04T13:40:00Z
        price: 180.20
        sma_20: 195.10
        sma_50: 188.40
        sma_200: 185.00
        rsi_14: 22.5
        atr_14: 6.10
        volume_20d_avg: 38_000_000

  # Seed reconciled performance so Signal-2 capital-EV reasoning has data.
  - write_substrate:
      path: /workspace/context/trading/_money_truth.md
      authored_by: operator-proxy:scenario-runner:acting-as-kvk
      content: |
        ---
        last_reconciled: 2026-06-04T05:00:00Z
        windows:
          30d:
            realized_pnl_usd: 1840.55
            fills: 19
            win_rate: 0.604
            expectancy_usd: 73.10
            sharpe: 1.41
        by_signal:
          signal-2-mean-reversion-oversold:
            realized_pnl_usd: 1240.50
            fills: 18
            expectancy_R: 0.31
        ---
        # Ground truth — kvk (signal-fires seed)

        Signal-2 shows +0.31R over 18 reconciled trades — comfortably above
        the framework's -0.5R decay guardrail. A fresh Signal-2 NVDA entry
        should clear the capital-EV check.

turns:
  # Fire signal-evaluation as the measured turn. It reads NVDA.yaml,
  # applies Signal-2's rule, and emits ProposeAction inline if it matches.
  # The deployed scheduler drains it (recurrence-fire = trigger reactive
  # post-409e5f7); the Reviewer runs the judgment. The READ is the
  # reasoning quality — the trade-firing mechanics are owned by the
  # architecture tests (§0), not asserted here.
  - fire: signal-evaluation
    expect:
      - reviewer_responded
      - reviewer_returnverdict_present
      # If Signal 2 matches: a sized, signal-attributed verdict. If not: a
      # clean stand-down naming why (likely a fixture-clobber finding per
      # the §0.2 caveat). Either way the cycle closes — a NULL-token
      # success row is the silent-wake fault (should not occur post-409e5f7).
      - signal_2_match_or_clean_standdown

capture:
  - revision_chain
  - decisions_md
  - action_proposals
  - token_usage_by_caller
  - all_session_messages
