# ╔══════════════════════════════════════════════════════════════════════╗
# ║  DEPRECATED — split into two read-kind suites (2026-05-29)            ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# This monolithic 10-eval v1 suite is superseded by EVAL-SUITE-DISCIPLINE.md's
# clean-slate rewrite (Proposed 2026-05-29). It grouped evals by the framework's
# industry eval-shape taxonomy (behavioral / red-team / behavioral_substrate_audit
# / counterfactual) and emitted a four-dimension scoring table — the shape the
# rewrite removes because it inverted the artifact-honesty axis (the one session
# that filled the table was withdrawn as misleading; the one that left it empty
# was validated). See docs/analysis/eval-suite-redesign-from-first-principles-2026-05-29.md.
#
# It is replaced by two suites, split by the KIND OF READ the operator does
# (EVAL-SUITE-DISCIPLINE.md §2):
#
#   yarnnn-author-judgment.yaml        ← evals 1-6 (judgment-coherence reads:
#                                          does the Reviewer reason like an editor
#                                          in a concrete known situation?)
#
#   yarnnn-author-responsiveness.yaml  ← evals 7-10 (substrate-responsiveness
#                                          reads: does the Reviewer track operator
#                                          mutations to its governing substrate?)
#
# This file is retained as a deprecation pointer (not deleted) so existing
# session folders that reference it stay traceable. Do NOT run this file —
# the v2 harness (per EVAL-SUITE-DISCIPLINE.md §8 change-list) refuses
# eval_suite_schema_version 1.
#
# Migration mapping: EVAL-SUITE-DISCIPLINE.md §7.
#
# The full v1 content is preserved in git history (last live revision: commit
# d38130e and ancestors). Recover via `git show <rev>:docs/evaluations/eval-suites/yarnnn-author-baseline.yaml`.

