---
tier: canon
note: "Operator-authored cadence preferences (ADR-275). Forked to /workspace/contract/_preferences.yaml at activation. The Reviewer reads this every wake and authors Schedule(action='create'|'update'|'archive') for declared preferences."
---
# _preferences.yaml — operator cadence preferences (ADR-275)
#
# This file declares the operator-facing deliverables the operator wants
# produced on cadence. The Reviewer reads this every wake and authors
# actual scheduled recurrences via the Schedule primitive to honor
# declared preferences. The Reviewer NEVER writes to this file — it is
# the operator's declaration of *what* and *when*; the Reviewer decides
# *how* (content judgment) and authors the actual cadence.
#
# Edit `cadence` to change when a deliverable is produced.
# Edit `active: false` to pause a deliverable without deleting the
# preference (the Reviewer will pause or archive the corresponding
# scheduled recurrence on its next wake).
#
# `cadence` supports plain UTC cron and `null` (no preference; Reviewer
# authors cadence from judgment if it deems the deliverable worth
# producing). alpha-author does not anchor to market hours, so semantic
# `@market_*` schedules are not used.
#
# `spec` is the path to the canonical capability spec — the Reviewer
# reads it when producing this deliverable (Claude Code skills.md
# analog).

deliverable_preferences:
  - slug: weekly-corpus-review
    spec: /workspace/operation/specs/weekly-corpus-review.md
    cadence: "0 18 * * 0"      # Sunday 18:00 UTC
    description: "Weekly synthesis of corpus state — voice fingerprint stability, continuity threads, cadence health, audience response when audience-bearing"
    active: true

  - slug: quarterly-voice-audit
    spec: /workspace/operation/specs/quarterly-voice-audit.md
    cadence: "0 18 31 3,6,9,12 *"   # Quarter-end at 18:00 UTC
    description: "Quarter-end voice fingerprint audit — does the declared _voice.md still match the corpus, or has voice evolved enough that the declaration needs operator-authored update?"
    active: true

  # ADR-333: the program's first PRODUCTION (non-audit) deliverable. The
  # Reviewer composes a published piece — authoring structure natively
  # (kind:-tagged sections where a kind carries the argument better than
  # prose, per the piece-composition spec). Cadence is `null` (no fixed
  # preference): a composed piece is produced when the operator has a piece
  # to compose, not on a clock. The Reviewer authors the actual recurrence
  # from judgment + operator intent when a draft is ready for composition.
  - slug: compose-piece
    spec: /workspace/operation/specs/piece-composition.md
    cadence: null
    description: "Compose a published piece as a structured article — author kind-tagged sections (comparison-table / mermaid / callout spine; metric-cards/status-matrix/trend-chart with real substrate data; generated images exceptional) where structure carries the argument better than prose. Output is the composed-HTML projection of content.md + sections/assets, pulled at consumption (ADR-333)."
    active: true


# =============================================================================
# operator_notifications — operator-addressing observability opt-ins (ADR-299)
# =============================================================================
#
# Per ADR-299 (rewrite 2026-05-27), `platform_email_send_to_operator` is
# operator-addressing system infrastructure — the system Resend wire
# (api/jobs/email.py, RESEND_API_KEY env var), the same wire ADR-040
# notifications + ADR-202 daily-update emails already use, exposed as an
# LLM-invokable tool. It is NOT a workspace capability and does NOT
# require operator Resend OAuth setup. The infrastructure is environment-
# deployed; the tool is always available to the agent path.
#
# Differs from deliverable_preferences above in three ways:
#   - Addressee is the operator's own inbox (auth.users.email at send-time),
#     not third-party / audience. The tool enforces this structurally —
#     no `to`, `cc`, `bcc`, `from_email`, `from_name` fields accepted.
#   - Authorization is observability (ADR-299 D5), NOT consequential
#     action. The opt-in below IS the standing approval; AUTONOMY
#     `delegation: manual` does NOT block these. AUTONOMY scoping is for
#     third-party-affecting writes only — same model ADR-040 and ADR-202
#     already use.
#   - No platform_connections gate. The system Resend wire is kernel
#     plumbing; operators do not connect Resend to receive these emails.
#
# Each entry shape:
#   - slug:        stable identifier (e.g. daily_corpus_state_update)
#   - description: what the Reviewer composes + sends
#   - cadence_hint: when the Reviewer should consider sending. The Reviewer
#                   does NOT auto-fire on cadence — it sends when the
#                   judgment cycle produces material worth surfacing AND
#                   the cadence hint is honored. Operator-tunable.
#   - active:      false to pause without deleting the preference
#
# Default-off discipline: each entry ships `active: false` so the bundle
# default does NOT spam any operator. The operator flips `active: true`
# on the preferences they want, per workspace. Multi-workspace operators
# tune notifications independently to avoid email fatigue.

operator_notifications:
  - slug: daily_corpus_state_update
    description: "Daily morning email summarizing yesterday's audit verdicts, drafts pending review, voice-drift signals from the last 24h, and pieces awaiting publication. Reviewer composes from /workspace/persona/judgment_log.md + /workspace/persona/standing_intent.md."
    cadence_hint: "Daily at 07:00 UTC (operator-tunable)"
    active: false

  - slug: pre_ship_audit_summary
    description: "Email sent immediately after a pre-ship-audit fires on a draft transitioning to ready_for_review — operator gets the Reviewer's verdict (approve / defer / reject) + reasoning summary while context is fresh, so they can iterate quickly on a deferred draft."
    cadence_hint: "Event-driven — fires when pre-ship-audit hook resolves"
    active: false
