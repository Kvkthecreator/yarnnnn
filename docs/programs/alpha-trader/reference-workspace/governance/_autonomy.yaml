# _autonomy.yaml — delegation ceiling (ADR-254)
# Machine-parsed by review_policy.load_autonomy() and working_memory.
# See AUTONOMY.md for documentation on what these fields mean.
# Edit this file to tune your delegation ceilings.
#
# ADR-312 D7 (program-declared autonomy default): the bundle ships the
# autonomy default appropriate to the operation; the kernel does not pick a
# global default (per ADR-286 Single-Writer Per Path, only the bundle fork
# writes this file). alpha-trader is a capital/rule-bound operation —
# reversible-ish, capped, rule-governed — so it defaults toward autonomous
# execution. (Relationship/high-touch operations like alpha-author default
# `manual`.) The operator tunes from here; the DEFAULT_REVIEWER_WRITE_LOCKS
# self-authority floor is unchanged — autonomy stays operator-owned.

default:
  # ADR-269 / iter-4 (2026-05-13): operator-authored flip to autonomous.
  # The operator explicitly elected full autonomous execution from first
  # signal fire rather than the AUTONOMY.md Phase-0 paper-seed posture.
  # `never_auto` survives as the hard safety floor: close_position_market
  # and cancel_other_orders still route to the operator's Queue regardless
  # of approve verdict. _risk.md hard caps (max_position_size_usd: 1000,
  # max_daily_loss_usd: 200, max_order_size_shares: 100, trading_hours_only)
  # are enforced by risk_gate.py before any order fires.
  delegation: autonomous
  # Safety net even under `autonomous` — orders whose notional exceeds this
  # still queue. $50,000 admits Signal-1 sized positions (~$12.5k notional)
  # on the paper-seed account ($25k); larger positions surface for click.
  ceiling_cents: 5000000
  never_auto:
    - close_position_market     # always requires operator click
    - cancel_other_orders

# NOTE: heartbeat_triggers field deleted by ADR-260 D4 + ADR-263.
# Rationale: cron is part of the environment that fires recurrences; the
# recurrence's own `mode` field (judgment | mechanical) per ADR-263 declares
# whether a fire wakes the Reviewer. There is no separate registry coupling
# substrate-change events to Reviewer wakes.
