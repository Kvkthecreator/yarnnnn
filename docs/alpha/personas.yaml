# Alpha-1 Persona Registry
#
# Single source of truth for who each alpha persona is and where their state
# lives. No secrets belong in this file — credentials live in 1Password +
# local env vars (see docs/alpha/OPERATOR-HARNESS.md).
#
# Both KVK and Claude read this file to know which workspace to act on.
# Any persona added here is callable via scripts/alpha_ops/*.py by slug.
#
# ADR-230 (2026-04-28): every persona row MUST declare a `program: <slug>`
# field whose target bundle exists at docs/programs/{program}/. Validated
# at load_registry() time. The persona slug and the program slug are
# independent — alpha-trader and alpha-trader-2 both run program=alpha-
# trader. Activation = `_fork_reference_workspace(persona.user_id,
# persona.program)` — same primitive as real-operator activation per
# ADR-226. The parallel scaffold path (scripts/alpha_ops/scaffold_trader.py)
# was DELETED by ADR-230 D5; activate_persona.py is the harness entry
# point post-ADR-230.
#
# ADR-231 (2026-04-28→29): the `tasks` table is a thin scheduling index;
# the `essential` and `mode` columns were dropped by migration 164. The
# legacy invariant fields `essential_tasks` and `active_bots` retired:
#   - essential_tasks  → scaffolded_recurrences (presence + active + !paused)
#   - active_bots      → active_roles (Platform Bots dissolved per ADR-205;
#                        platform capability now binds to platform_connections,
#                        not an agent row)
#
# Last confirmed against DB: 2026-04-29

version: 1

supabase:
  url: https://noxgqcwynkzqabljjyon.supabase.co
  # SUPABASE_SERVICE_KEY lives in env (docs/database/ACCESS.md for value)

api:
  prod_base_url: https://yarnnn-api.onrender.com
  # JWTs are short-lived (1h); mint fresh via scripts/alpha_ops/mint_jwt.py

personas:

  - slug: alpha-trader
    label: "Simons-inspired systematic retail trader"
    program: alpha-trader   # ADR-230 D1: bundle at docs/programs/alpha-trader/
    email: seulkim88@gmail.com
    user_id: 2be30ac5-b3cf-46b1-aeb8-af39cd351af4
    workspace_id: b7e1b9bc-ffb3-478e-bd05-dcae01a8a6b1
    platform:
      kind: trading
      provider: alpaca
      mode: paper           # paper | live — alpha stays paper through Phase 2
      account_suffix: X4DJ  # last 4 of Alpaca account number, for sanity-check
    context_domains:
      - trading
      - portfolio
      - signals
    # Exact cred env-var names the connect script reads.
    # Not the values — those are in 1Password > YARNNN Alpha-1 > alpha-trader.alpaca-paper
    credentials_env:
      api_key:    ALPHA_TRADER_ALPACA_KEY
      api_secret: ALPHA_TRADER_ALPACA_SECRET
    vault_entry: "1Password > YARNNN Alpha-1 > alpha-trader.alpaca-paper"
    # Invariants that verify.py checks on this persona.
    expected:
      agent_count: 4   # YARNNN + lazy-created tracker/analyst/writer
      active_roles: [thinking_partner, tracker, analyst, writer]
      # Post-ADR-231: declaration substrate at the path shown after each slug.
      # Recurrences with `-2` suffix on alpha-trader-2 follow the same shape.
      scaffolded_recurrences:
        - track-universe                 # /workspace/context/trading/_recurring.yaml
        - signal-evaluation              # /workspace/context/trading/_recurring.yaml
        - pre-market-brief               # /workspace/reports/pre-market-brief/_spec.yaml
        - trade-proposal                 # /workspace/operations/trade-proposal/_action.yaml
        - weekly-performance-review      # /workspace/reports/weekly-performance-review/_spec.yaml
        - quarterly-signal-audit         # /workspace/reports/quarterly-signal-audit/_spec.yaml
        - back-office-narrative-digest         # /workspace/_shared/back-office.yaml (ADR-248)
        - back-office-outcome-reconciliation  # /workspace/_shared/back-office.yaml
        - back-office-proposal-cleanup        # /workspace/_shared/back-office.yaml
        - back-office-reviewer-calibration    # /workspace/_shared/back-office.yaml
        - back-office-reviewer-reflection     # /workspace/_shared/back-office.yaml
      platform_connections: 1
      core_files:
        - /workspace/_shared/back-office.yaml   # ADR-248: forked from bundle at activation
        - /workspace/context/_shared/IDENTITY.md
        - /workspace/context/_shared/MANDATE.md
        - /workspace/context/_shared/AUTONOMY.md
        - /workspace/context/_shared/BRAND.md
        - /workspace/context/_shared/CONVENTIONS.md
        - /workspace/context/trading/_operator_profile.md
        - /workspace/context/trading/_risk.md
