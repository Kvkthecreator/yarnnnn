        - /workspace/operation/authored/_voice.md
        - /workspace/operation/authored/_editorial.md
        - /workspace/operation/authored/_entities.md
        - /workspace/persona/principles.md
        - /workspace/persona/OCCUPANT.md   # ADR-284 D3: runtime-truth-aligned seat occupant declaration
      occupant_attribution:                # ADR-284 D3: substrate-runtime alignment check
        # AI occupant expected post-bundle-fork — alpha-author runs the
        # editor-shaped Reviewer seat under the same AI-occupant default
        # as alpha-trader (current alpha state per FOUNDATIONS Axiom 2
        # v8.4 hardening — operator-as-Reviewer two-embodiments framing).
        # Operator may swap to human occupant by editing OCCUPANT.md.
        expected_occupant_class: ai
        expected_occupant_prefix: "ai:reviewer-sonnet-"

