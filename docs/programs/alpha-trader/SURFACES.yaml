schema_version: 1

# alpha-trader composition manifest. Read by the forthcoming compositor
# (ADR forthcoming, ADR-222 implementation roadmap ADR 2). Speaks ADR-198
# archetypes (Document/Dashboard/Queue/Briefing/Stream) × ADR-214 4-tab
# nav (chat/work/agents/context).
#
# All bindings are filesystem paths. All components must exist in the
# system component library (web/components/library/) at compositor
# render time — components shipped here are placeholders for the
# library convention forthcoming in the System Component Library ADR.

tabs:
  work:
    list:
      pinned_tasks: [trading-signal, portfolio-review]
      group_default: output_kind
      filters_default:
        output_kind: produces_deliverable
      # ADR-225 Phase 3 + cockpit reshape (2026-04-28): bundle-supplied
      # cockpit pane sequence following the six-question framing.
      # Universal pane shape, alpha-trader-specialized data + components:
      #   1. Trust violations  → TrustViolations (universal)
      #   2. Mandate           → MandateStrip (universal)
      #   3. Decisions due     → TradingProposalQueue (trader-shaped, replaces NeedsMe)
      #   4. Money truth       → MoneyTruthTile bound to portfolio _performance.md
      #   5. Material narrative → MaterialNarrativeStrip (universal)
      #   6. Team health        → TeamHealthCard (universal)
      cockpit_panes:
        - kind: TrustViolations
        - kind: MandateStrip
        - kind: TradingProposalQueue
          filters:
            proposal_type: trading
            status: pending
        - kind: MoneyTruthTile
          binding:
            type: file
            path: /workspace/context/portfolio/_performance.md
        - kind: MaterialNarrativeStrip
        - kind: TeamHealthCard
    detail:
      middles:
        - match: { task_slug: portfolio-review }
          archetype: dashboard
          bindings:
            performance: /workspace/context/portfolio/_performance.md
            positions: /workspace/context/portfolio/_positions.md
            risk: /workspace/context/portfolio/_risk_state.md
          components:
            - kind: PerformanceSnapshot
              source: performance
            - kind: PositionsTable
              source: positions
            - kind: RiskBudgetGauge
              source: risk
          # ADR-225 Phase 3: bundle-supplied chrome.
          # The kernel default for produces_deliverable shows
          # "Last output: 3h ago" — meaningless for a Dashboard
          # middle that regenerates substrate every run. Override
          # with TradingPortfolioMetadata which reads _performance.md
          # frontmatter for substrate freshness + positions_count.
          # Actions stay kernel-default (Pause/Resume + Edit-in-chat).
          chrome:
            metadata:
              kind: TradingPortfolioMetadata
              source: performance
            actions:
              - kind: KernelDeliverableActions

        - match: { task_slug: trading-signal }
          archetype: queue
          # trading-signal emits proposals into action_proposals; the
          # detail middle for this task surfaces the proposal queue
          # filtered to trading-shaped envelopes with signal attribution.
          bindings:
            proposals: /action_proposals
          components:
            - kind: TradingProposalQueue
              source: proposals
              filters:
                proposal_type: trading
                status: pending
          # No chrome override — falls through to kernel
          # produces_deliverable chrome (KernelDeliverableMetadata +
          # KernelDeliverableActions). The signal task's "Last output:
          # 3h ago" framing is correct here — proposals ARE the
          # output, and they age.

  agents:
    list:
      featured: [trading-bot, reviewer]
    reviewer:
      principles_default: reference-workspace/review/principles.md

  context:
    list:
      featured_domains: [trading, portfolio]

chat_chips:
  - "Walk me through today's signals"
  - "What's my risk budget right now?"
  - "Did anything trigger overnight?"
  - "Show me last week's expectancy by signal"

phase_overlays:
  observation:
    tabs:
      work:
        list:
          banner: "Paper-only. Live trading gated on AUTONOMY.md flip."
  paper_discipline:
    tabs:
      work:
        list:
          banner: "Phase 1 — Paper Discipline. 90-day process-obedience window."
  live_float:
    tabs:
      work:
        list:
          banner: "Phase 2 — Live Float. Every order requires Reviewer approval."
  calibrated_autonomy:
    tabs:
      work:
        list:
          banner: "Phase 3 — Calibrated Autonomy. Selective auto-approval active per principles.md."
  self_funding:
    tabs:
      work:
        list:
          banner: "Phase 4 — Self-Funding Validated."
