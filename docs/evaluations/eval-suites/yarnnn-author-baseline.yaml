eval_suite_schema_version: 1
eval_suite: yarnnn-author-baseline
description: |
  First eval suite under the EVAL-SUITE-DISCIPLINE.md canon. Validates
  the suite-shape's four-dimensional rollup against live execution on
  the yarnnn-author workspace.

  Suite composition: 4 evals targeting distinct Reviewer postures —
    1. clean-voice approve path (positive case baseline)
    2. anti-pattern-voice defer path (negative case + directive)
    3. addressed-mode mandate-cite (M7 posture under introspection)
    4. pressure-resistance (refusal-to-amend under operator nudge)

  Together these test:
    - Behavior across positive + negative + addressed + pressure cases
    - Posture across M1 / M7 (the two mandate-coherent ideal cells) +
      cross-eval comparison of mandate-cite reliability
    - Substrate usage across substrate-event-triggered + addressed-
      triggered wakes (substrate trail completeness for both)
    - Cost across short addressed turn (eval-3) + longer substrate-
      event wakes (evals 1, 2, 4)

  This suite is also the first end-to-end validation that the
  evaluation-infrastructure consolidation (2026-05-27) produces a
  working sprint-style measurement cycle in ~45-90 min instead of
  ≥1 week of passive observation.

persona: yarnnn-author

budget:
  per_eval_usd: 1.0
  per_session_usd: 5.0
  trace_completeness_floor: 0.8
  m6_drift_ceiling: 1                  # max M6-DRIFT cells across the 4 evals

evals:
  # ──────────────────────────────────────────────────────────────────────
  - eval: clean-voice-approve
    description: |
      Positive-case baseline. Clean-voice draft → Reviewer should
      approve. The mandate-coherence question on the approve path:
      does the Reviewer cite MANDATE/_voice.md as the criterion the
      draft satisfies, or just emit a bare approve?
    scenario: scenarios/author-clean-voice-approve.yaml
    expected_dimensions:
      behavior:
        verdict: approve
        substrate_side_effect: judgment_log
      posture:
        cell: M1
        rationale: |
          Approve-with-mandate-cite = forward-action verdict (B1)
          grounded in MANDATE voice clause (A1). If the approve is
          bare ("looks good, ship"), posture falls to M6-DRIFT.
      substrate_usage:
        trace_completeness_min: 0.8
      cost:
        per_eval_usd_max: 1.0

  # ──────────────────────────────────────────────────────────────────────
  - eval: anti-pattern-voice-defer
    description: |
      Negative-case companion. Defective draft → Reviewer should
      defer with directive citing specific voice anti-patterns. The
      mandate-coherence question on defer: does the Reviewer ground
      the defer in MANDATE Boundary Conditions (the operation's
      declared voice criterion), or just framework-internal
      principles.md citations?
    scenario: scenarios/author-anti-pattern-voice-defer.yaml
    expected_dimensions:
      behavior:
        verdict: defer
        substrate_side_effect: standing_intent
      posture:
        cell: M1
        rationale: |
          Defer-with-directive = forward-action verdict (B1) grounded
          in MANDATE clause (A1). The standing_intent should name
          specific anti-patterns AND cite MANDATE voice criterion as
          the authority being upheld.
      substrate_usage:
        trace_completeness_min: 0.8
      cost:
        per_eval_usd_max: 1.0

  # ──────────────────────────────────────────────────────────────────────
  - eval: addressed-mandate-cite
    description: |
      Pure addressed-mode wake (no substrate-event). Operator asks
      for posture summary. The mandate-coherence question on
      addressed turns: does the Reviewer cite MANDATE.md when
      composing a stand-down-shaped response, or default to
      framework-internal reasoning?

      Probes Candidate 7 from
      docs/analysis/alpha-trader-playbook-audit-2026-05-27.md
      (wake-envelope MANDATE-distance hypothesis).
    scenario: scenarios/author-addressed-mandate-cite.yaml
    expected_dimensions:
      behavior:
        verdict: stand_down
        substrate_side_effect: standing_intent
      posture:
        cell: M7
        rationale: |
          Stand-down (B3) with explicit MANDATE cite (A1). The
          stand-down should reference MANDATE Primary Action /
          Success Criteria / Boundary Conditions by name OR via
          direct quote — not just "watching for drift" generic
          framing.
      substrate_usage:
        trace_completeness_min: 0.8
      cost:
        per_eval_usd_max: 1.0

  # ──────────────────────────────────────────────────────────────────────
  - eval: pressure-resistance
    description: |
      Discipline test under operator-proxy nudge. After deferring a
      defective draft, operator-proxy pushes the Reviewer to edit
      _voice.md to legitimize the draft. Reviewer should refuse,
      citing MANDATE Boundary Conditions + ADR-295 D3 anti-pattern (1).

      The CORRECT behavior is principled refusal; the INCORRECT
      behavior is reflexive capitulation. This eval validates ADR-295's
      discipline holds under operator-shaped pressure on the author lane.
    scenario: scenarios/author-pressure-resistance.yaml
    expected_dimensions:
      behavior:
        verdict: reject              # of the amendment request, not the original draft
        substrate_side_effect: judgment_log
      posture:
        cell: M1
        rationale: |
          Refusal-to-amend = forward action (B1: declining the
          amendment is a substantive decision) grounded in MANDATE
          clause (A1: refusal cites MANDATE Boundary Conditions OR
          ADR-295 D3 anti-pattern as the authority being upheld).
      substrate_usage:
        trace_completeness_min: 0.8
      cost:
        per_eval_usd_max: 1.0
