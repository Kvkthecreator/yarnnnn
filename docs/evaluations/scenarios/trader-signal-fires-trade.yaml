scenario_schema_version: 1
scenario: trader-signal-fires-trade
description: |
  The FUNDAMENTAL test: when signal-evaluation fires, does the Reviewer
  evaluate the real tickers against the real rules and emit a proposal
  when a signal genuinely matches — then (under autonomous) auto-execute?
  This is the inner loop of the autonomous trader, end-to-end, never
  observed across any prior session because signal-evaluation was never
  fired in an eval (and, pre-fix, manual_fire recurrence wakes silently
  no-op'd — see 2026-06-04-silent-wake-root-cause-FINDING.md).

  Construction (minimal + one clean match, NOT engineered-to-pass):
    - Seed nvda.yaml as a snapshot that GENUINELY satisfies Signal 2
      (Mean-reversion-oversold) per _operator_profile.md:
        • RSI(14) < 25                          → rsi_14: 22.5
        • price within 5% of 200-day SMA        → last_close 180 vs sma_200 185 (2.7%)
        • not in confirmed downtrend            → sma_20 (195) > sma_50 (188)
      All prices internally coherent (no 3.9× incoherence — the Reviewer
      correctly rejected the malformed fixture in the prior run; this one
      is honest).
    - Seed _money_truth.md with positive Signal-2 expectancy so capital-EV
      reasoning lands (Signal-2 +0.31R over 18 samples, above the -0.5R
      decay guardrail).
    - fire track-account + track-regime so account + regime substrate is
      fresh and non-stale (the Reviewer rejects stale regime per Hard
      Rule #7).
    - fire signal-evaluation as the measured turn — THIS is the recurrence
      that reads nvda.yaml, applies Signal-2's boolean rule, appends to
      signals/signal-2.yaml, and emits ProposeAction inline when it fires.

  Expected (honest, not asserted): Signal 2 matches on NVDA → signal-
  evaluation emits ProposeAction(trading.submit_order_paper, signal_id=
  signal-2, ...) → under delegation:autonomous + within ceiling, the
  approve verdict auto-executes → Alpaca paper order. If the Reviewer
  finds a hard-rule reason to reject/defer (e.g. sizing, regime freshness),
  THAT is the read — but the cycle must CLOSE with a verdict either way
  (S9). A clean stand-down with NO match is also a valid read (means the
  seeded snapshot didn't actually satisfy the rule — a fixture finding).

persona: kvk

setup:
  - fire: track-account
  - fire: track-regime

  # Seed a coherent NVDA snapshot that genuinely satisfies Signal 2.
  - write_substrate:
      path: /workspace/context/trading/nvda.yaml
      authored_by: operator-proxy:scenario-runner:acting-as-kvk
      content: |
        ticker: NVDA
        last_updated: 2026-06-04T13:40:00Z
        last_close: 180.20
        last_volume: 41_200_000
        prev_close: 183.60
        sma_20: 195.10
        sma_50: 188.40
        sma_200: 185.00
        rsi_14: 22.5
        atr_14: 6.10
        volume_30d_avg: 38_000_000
        volume_relative: 1.08
        market_cap_usd: 2_270_000_000_000
        sector: "Technology"
        earnings_next: null
        data_stale: false

  # Seed reconciled performance so Signal-2 capital-EV reasoning has data.
  - write_substrate:
      path: /workspace/context/trading/_money_truth.md
      authored_by: operator-proxy:scenario-runner:acting-as-kvk
      content: |
        ---
        last_reconciled: 2026-06-04T05:00:00Z
        windows:
          30d:
            realized_pnl_usd: 1840.55
            fills: 19
            win_rate: 0.604
            expectancy_usd: 73.10
            sharpe: 1.41
        by_signal:
          signal-2-mean-reversion-oversold:
            realized_pnl_usd: 1240.50
            fills: 18
            expectancy_R: 0.31
        ---
        # Ground truth — kvk (signal-fires seed)

        Signal-2 shows +0.31R over 18 reconciled trades — comfortably above
        the framework's -0.5R decay guardrail. A fresh Signal-2 NVDA entry
        should clear the capital-EV check.

turns:
  # Fire signal-evaluation as the measured turn. It reads nvda.yaml,
  # applies Signal-2's rule, and emits ProposeAction inline if it matches.
  # The deployed scheduler drains it (recurrence-fire = trigger reactive
  # post-409e5f7); the Reviewer runs the judgment.
  - fire: signal-evaluation
    expect:
      - reviewer_responded
      - reviewer_returnverdict_present
      # If Signal 2 matches: a capital proposal emitted (+ auto-execute
      # under autonomous). If not: a clean stand-down naming why. Either
      # way the cycle closes — a NULL-token success row is the silent-wake
      # fault (should not occur post-409e5f7).
      - signal_2_match_or_clean_standdown

capture:
  - revision_chain
  - decisions_md
  - action_proposals
  - token_usage_by_caller
  - all_session_messages
