schema_version: 1
slug: alpha-trader
title: alpha-trader
status: active
# ADR-292: bundle version stamp. Bumped manually by the bundle author when
# any file under reference-workspace/ or specs/ changes meaningfully.
# Format: date-stamped `YYYY-MM-DD[.N]` aligning with api/prompts/CHANGELOG.md.
# Operator-facing update flow compares this against the workspace's recorded
# `activated_bundle_version` (MANDATE.md frontmatter) and surfaces "Bundle
# update available" when the strings differ. Discipline cost: one line per
# bundle change, identical to the CHANGELOG entry the change already needs.
version: 2026-06-22.1
date_created: 2026-04-26
date_updated: 2026-05-20

tagline: Equities + options operator workflow with continuous-price oracle. Self-funding by design.

# ADR-327: minimum_pace removed — pace retires (frequency is not a concept;
# it is the Reviewer's allocation problem within the dollar budget). Cost
# governance is _budget.yaml (kernel default $50/monthly; bundle ships its
# own via reference-workspace fork). No activation pace gate.

oracle:
  shape: continuous_price
  source: alpaca + polygon
  latency: intraday_marks_daily_settles
  irreversibility: reversible
  custody: brokerage_held
  capital_threshold_usd: 5000
  attribution: per_position_pnl_with_signal_attribution

# ADR-268: market_context block. Recurrences in this bundle's
# reference-workspace/_recurrences.yaml may use semantic `@`-prefixed
# schedules (`@market_open + 15min`, `@every 1min during regular_hours`,
# etc.) — they resolve to UTC at materialize-due time against the
# timezone + sessions + calendar declared here. Plain UTC cron schedules
# still work for market-agnostic recurrences (daily housekeeping, weekly
# reviews). Future markets (Korean equities, crypto 24/7, futures)
# declare their own market_context block + register a MarketCalendar in
# api/services/market_calendars.py.
market_context:
  exchange: us_equities
  timezone: America/New_York
  sessions:
    regular_hours: { open: "09:30", close: "16:00" }
    pre_market:    { open: "04:00", close: "09:30" }
    after_hours:   { open: "16:00", close: "20:00" }
  trading_days: weekdays
  calendar: nyse_us

dependencies:
  required:
    - adr: ADR-209          # authored substrate revision chain
    - adr: ADR-195          # OutcomeProvider abstraction + _money_truth.md
    - adr: ADR-194          # Reviewer with capital-EV reasoning
    - adr: ADR-217          # AUTONOMY.md delegation file
    - adr: ADR-181          # source-agnostic feedback (system_outcome)
    - adr: ADR-187          # Trading integration (Alpaca + Polygon.io)
    - adr: ADR-202          # action proposal queue with approval/rejection
    - capability: read_trading
    - capability: write_trading
  lean:
    - thesis_section: substrate_replay_primitive
    - thesis_section: mandate_outcome_signal_hardening
    - tool: get_fundamentals  # exists in alpaca_client.py:718, not exposed as tool

context_domains:
  - path: trading
    purpose: per-instrument entities, signals, watched universe
    display_name: Trading
    description: Market data, signals, and analysis for tracked financial instruments
    entity_type: instrument
    entity_structure:
      profile.md: |
        # {name}

        ## Price & Volume

        ## Fundamentals

        ## Signal History
      analysis.md: |
        # Analysis — {name}

        <!-- Latest analysis with reasoning, newest first -->
    synthesis_file: overview.md
    synthesis_template: |
      # Trading Overview

      ## Watchlist Status

      ## Cross-Asset Patterns

      ## Active Signals
    tracker_file: _tracker.md
    # ADR-220: operator-authored canonical reads injected into every
    # task prompt that includes this domain. Order is presentation order.
    # ADR-230 D2: each path here MUST have a matching template file in
    # this bundle's reference-workspace/. Accumulated substrate (e.g.
    # _money_truth.md, _tracker.md) is written by judgment-mode recurrences
    # (e.g. outcome-reconciliation, calibration) at runtime — not authored
    # at activation — so it does NOT belong here. (Post-ADR-260 collapse:
    # what were "back-office tasks" are now ordinary recurrences declared
    # in _recurrences.yaml; the back_office/ Python package is deleted.)
    authored_substrate:
      - _operator_profile.md
      - _risk.md

  - path: portfolio
    purpose: account-level state, performance, risk
    display_name: Portfolio
    description: Trading account state — positions, trade history, performance metrics
    entity_type: position
    entity_structure:
      profile.md: |
        # {name}

        ## Entry

        ## Current State

        ## Thesis & Exit Criteria
    synthesis_file: summary.md
    synthesis_template: |
      # Portfolio Summary

      ## Account State

      ## Position Mix

      ## Performance & Attribution
    tracker_file: _tracker.md
    # ADR-230 D2: portfolio money-truth (_money_truth.md) is accumulated
    # substrate — written by the outcome-reconciliation recurrence per
    # ADR-195 v2 + ADR-228 substrate-stub fix. NOT authored at activation,
    # so it does not appear in authored_substrate. The first run of the
    # reconciler creates an empty stub; from there it accumulates.
    # (Post-ADR-260 collapse: the reconciler is an ordinary judgment-mode
    # recurrence in _recurrences.yaml, not a back-office task.)
    authored_substrate: []

# task_types: DELETED by ADR-263 + ADR-264 cleanup pass.
# The TASK_TYPES registry was deprecated by ADR-207 (frozen seed library,
# no longer dispatch-authoritative) and dissolved further by ADR-261
# (recurrences are the singular work-execution shape). The pipeline reads
# _recurrences.yaml, never task_types declarations. Bundle-level task_types
# blocks are dead weight. Per ADR-263, scheduled work flows entirely through
# _recurrences.yaml; the recurrence's `mode` field declares whether it is
# judgment or mechanical.


capabilities:
  - key: read_trading
    category: tool
    runtime: external:trading
    requires_connection: trading        # platform_connections.platform value
    # ADR-335 derived-trust-tier: this read IS the money-truth read — account +
    # positions + portfolio history reconcile into ground_truth (_money_truth.md).
    # Its correctness is constitutive of the program's ground-truth ⇒ HIGH tier ⇒
    # admits only a platform-grade binding (today: the hand-authored Direct API
    # Alpaca client). Money-truth never flows through a community server — a
    # theorem of the derived-tier gate, not a special case.
    feeds: ground_truth
    tools:
      - platform_trading_get_account
      - platform_trading_get_positions
      - platform_trading_get_orders
      - platform_trading_get_market_data
      - platform_trading_get_portfolio_history
  - key: write_trading
    category: tool
    runtime: external:trading
    requires_connection: trading
    # ADR-335 derived-trust-tier: a consequential act (capital movement) — the
    # program's primary action ⇒ HIGH tier ⇒ platform-grade binding only.
    feeds: action
    tools:
      - platform_trading_submit_order
      - platform_trading_cancel_order
      - platform_trading_close_position

# ADR-280: Substrate ABI — bundle's contract with the kernel for substrate
# topology. Declares which path zones this program uses, their roles, and
# what substrate the Reviewer needs pre-loaded at every wake. The kernel
# reads this declaration via `services/bundle_reader.py` helpers and merges
# it with kernel-universal declarations into the workspace's `_workspace_guide.md`
# at genesis (Reviewer-authored at first wake per ADR-280 §2.D4).
#
# Role taxonomy (six roles per ADR-280 §2.D2):
#   operator-canon     - operator-authored library (locked from Reviewer)
#   reviewer-workbench - Reviewer's working substrate (unlocked for Reviewer)
#   system-ledger      - infrastructure-rendered append-only (locked from LLM)
#   world-mirror       - mechanical mirror of external state (locked from LLM)
#   running-narrative  - append-shape, mechanical or judgment-fed
#   kernel-index       - kernel-managed regenerable index
substrate_abi:
  schema_version: 1

  # ADR-327 D6 — the program's ground-truth file: the substrate the Reviewer's
  # cadence judgment is calibrated against (the self-improving loop). The
  # kernel calibration mirror (_calibration.md) correlates the Reviewer's
  # cadence-authoring history against outcome quality read from here; the
  # persona-frame posture instructs the Reviewer to read _calibration.md
  # before reasoning about cadence. For alpha-trader, ground truth is money:
  # realized P&L + per-signal attribution in _money_truth.md.
  ground_truth: operation/trading/_money_truth.md

  # ADR-335 D2 — the program's declared watches: the perception twin of
  # `ground_truth` above. The third trader-private pattern promoted to a
  # kernel slot (after ground_truth per ADR-330 and the /setup flow-walk per
  # ADR-331): _universe.yaml stops being trader-private vocabulary and
  # becomes a kernel-declared watch. Each watch is a Layer-1 declaration:
  # WHAT the operation watches (`shape` — a perception shape, never a
  # vendor), WHERE the operator edits it (`declaration` — operator-editable
  # watch substrate), WHICH recurrence enacts its cadence (`recurrence` —
  # the Trigger pointer; the cadence itself lives ON the recurrence in
  # _recurrences.yaml, singular, never duplicated here), and WHERE
  # observations distill to (`distills_to` — attributed signal substrate
  # per the ADR-335 D3 observation contract). Attestation is a
  # per-observation property (D3), not a static declaration field.
  # Read by bundle_reader.get_watches_for_workspace — same loader pattern
  # as get_ground_truth_for_workspace.
  watches:
    - id: universe
      shape: instrument_price_oracle
      declaration: operation/trading/_universe.yaml
      recurrence: track-universe
      distills_to: "operation/trading/{TICKER}.yaml"
    - id: regime
      shape: market_regime
      declaration: operation/trading/_operator_profile.md
      recurrence: track-regime
      distills_to: operation/trading/_regime.yaml

  # Path zones this program contributes beyond the kernel-universal set.
  #
  # ADR-293 (2026-05-19): `role: operator-canon` is INFORMATIONAL metadata
  # only. Pre-ADR-293 the role conferred Reviewer write-lock via bundle_reader.
  # get_path_zone_locks_for_workspace. That helper is DELETED. Lock-derivation
  # collapsed to the kernel-universal governance set (AUTONOMY + token_budget).
  # These paths are now OPERATIONAL — Reviewer-writable, gated by AUTONOMY mode
  # at write-time per ADR-293 D4.
  #
  # The role tag survives as documentation: it declares the author-of-origin
  # (operator authored these files at activation; Reviewer maintains them
  # on the operator's behalf going forward). For surface labeling (cockpit
  # "Operator-authored" badges) and first-fork-write attribution, the role
  # is still meaningful — it just no longer locks.
  path_zones:
    - path: operation/trading
      role: operator-canon
      purpose: per-instrument entities, signals, watched universe
      authored_files: [_operator_profile.md, _risk.md, _universe.yaml]
      accumulating_files: [_money_truth.md, _tracker.md, _regime.yaml]
      glob_zones: ["signals/*.yaml", "{TICKER}.yaml"]
    - path: operation/portfolio
      role: operator-canon
      purpose: account-level state, performance, risk
      accumulating_files: [_money_truth.md, _tracker.md]

  # Substrate the Reviewer needs pre-loaded at every wake to perceive program state.
  # The kernel envelope-assembly function reads this declaration and gathers accordingly.
  # Universal envelope entries (identity_md, principles_md, precedent_md, mandate_md,
  # autonomy_md, preferences_yaml) are kernel-shipped — bundles only declare additions.
  reviewer_wake_envelope:
    - key: operator_profile_md
      path: operation/trading/_operator_profile.md
      optional: false
    - key: risk_md
      path: operation/trading/_risk.md
      optional: false
    - key: ground_truth_md
      path: operation/trading/_money_truth.md
      optional: true   # accumulated by reconciler — empty before first reconciliation. Kernel slot name `ground_truth_md` per FOUNDATIONS Axiom 8 + ADR-282 vocabulary discipline (ADR-288 D5); the substrate file `_money_truth.md` is the alpha-trader instance of ground-truth substrate.
    # ADR-281: signal_files is now a path-only entry pointing at the
    # compact substrate file written by the mirror-signal-state mechanical
    # recurrence (see _recurrences.yaml). Per Derived Principle 19, the
    # kernel reads substrate; derivative-compaction state is written by
    # mechanical primitives at known cadence, not summarized at LLM-
    # prompt-assembly time. World-mirror role per the six-role taxonomy.
    - key: signal_files
      path: operation/trading/_signals_summary.md
      optional: true
    # ADR-335 Crawl-A: the watch declaration joins the wake envelope so the
    # Reviewer perceives its portfolio of attention (which tickers the
    # operation watches) — the Layer-1 substrate it manages (re-declares,
    # prunes) under the perception-field model. The transport stays
    # invisible: judgment is substrate-aware, transport-blind (ADR-335 D3);
    # this entry is the declaration, never the device.
    - key: watch_declaration
      path: operation/trading/_universe.yaml
      optional: false

activation_preconditions: []  # already active

phases:
  - key: observation
    label: Phase 0 — Observation
    description: Paper account, AUTONOMY bounded_autonomous, Reviewer reasoning logged, no live capital
  - key: paper_discipline
    label: Phase 1 — Paper Discipline
    description: 90 days of MANDATE compliance, signal expectancy data accumulates in _money_truth.md
  - key: live_float
    label: Phase 2 — Live Float
    description: Small live capital ($5-10K), AUTONOMY flipped to manual approval, every order operator-approved
  - key: calibrated_autonomy
    label: Phase 3 — Calibrated Autonomy
    description: Selective auto-approval per principles.md thresholds, expanded based on Phase 2 calibration data
  - key: self_funding
    label: Phase 4 — Self-Funding Validated
    description: Live P&L sustains platform cost over rolling 90 days
current_phase: observation

references:
