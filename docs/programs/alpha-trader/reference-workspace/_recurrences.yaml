# /workspace/_recurrences.yaml — alpha-trader bundle (ADR-261 D2 + ADR-263 D1 + ADR-268)
#
# Single canonical recurrences file. The operator can read the entire
# scheduled-work surface in 30 seconds. Per ADR-261 D1 each entry is
# {slug, schedule, mode, prompt} where:
#   - slug:     stable identifier
#   - schedule: plain UTC cron, @-prefixed semantic schedule (ADR-268),
#               a list of either (multiple fires per day), or null (reactive)
#   - mode:     judgment (wakes Reviewer with prompt) | mechanical (executes
#               @primitive: ... directive deterministically; no Reviewer wake)
#               Default at parse time when absent: 'judgment' (legacy compat).
#   - prompt:   Reviewer message (judgment mode) OR @primitive: ... (mechanical mode)
#
# Per ADR-263 D2: cron is part of the environment that fires recurrences;
# the recurrence's `mode` field declares whether the fire wakes the Reviewer.
#
# Per ADR-264: SyncPlatformState is the canonical mechanical primitive that
# mirrors external state into substrate. Mechanical-mode recurrences invoke
# it via @primitive: SyncPlatformState(...) directives.
#
# Per ADR-262 D1: every output path is slug-templated by CONVENTIONS.md;
# every spec referenced by a prompt lives under /workspace/specs/.
#
# Per ADR-268: semantic schedules ("@market_open + 15min",
# "@every 1min during regular_hours") resolve to UTC at materialize-due
# time against this bundle's market_context (declared in MANIFEST.yaml).
# Market-anchored recurrences live in the trading-business section below;
# market-agnostic housekeeping uses plain UTC cron.

recurrences:

  # ── MECHANICAL MIRRORS (ADR-264) — keep substrate fresh, no LLM cost ─────
  # These recurrences run as deterministic Python via SyncPlatformState.
  # They write to substrate at known paths; the Reviewer reads substrate,
  # never broker APIs as primary perception (ADR-264 substrate-canonical
  # world axiom). Diff-aware writes skip when content unchanged — quiet
  # markets produce zero revision noise.

  - slug: track-positions
    schedule: "@every 1min during regular_hours"   # ADR-268: every minute during RTH (9:30-16:00 ET)
    mode: mechanical
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_positions",
        write_to="context/portfolio/positions/{symbol}.yaml",
        iterate_field="positions",
        item_key="symbol",
        diff_aware=true
      )
    display_name: "Position State Mirror"

  - slug: track-account
    schedule: "@every 5min during regular_hours"   # ADR-268: every 5 min during RTH
    mode: mechanical
    # ADR-270: fire at activation so the operator sees account state
    # populated in the cockpit immediately, regardless of RTH timing.
    fire_on_activation: true
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_account",
        write_to="context/portfolio/_account.yaml",
        diff_aware=true
      )
    display_name: "Account State Mirror"

  - slug: track-orders
    schedule: "@every 1min during regular_hours"   # ADR-268: every minute during RTH
    mode: mechanical
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_orders",
        tool_args={"status": "open"},
        write_to="context/portfolio/_orders.yaml",
        diff_aware=true
      )
    display_name: "Open Orders Mirror"

  # ── JUDGMENT RECURRENCES — wake the Reviewer with a prompt ──────────────

  # ── track-regime — refresh portfolio-level regime state ──────────────────
  # Operator declared Signal 5 (VIX regime filter) in _operator_profile.md;
  # _risk.md sets apply_vix_regime_scalar: true. This recurrence is the
  # substrate sensor that makes the predicate live. ADR-271 Thread A:
  # migrated to mechanical mode — deterministic Python computes the regime
  # predicate from VIXY+SPY 1Day bars; zero LLM cost; the Reviewer reads
  # the resulting _regime.yaml at proposal time.
  #
  # Was judgment-mode pre-ADR-271; ADR-263 §"Why this rewrite" named this
  # exact recurrence as the canonical mechanical-vs-judgment mismatch case.
  - slug: track-regime
    # ADR-268: 30 min after RTH close — VIXY's 1Day bar is settled.
    # Fires before next morning's pre-market-brief so the brief reads
    # fresh regime state.
    schedule: "@market_close + 30min"   # 16:30 ET
    mode: mechanical
    # ADR-270: fire at activation so _regime.yaml exists before the
    # first signal-evaluation fire. Mechanical mode means this runs in
    # ~1-2s with no LLM cost, so cold-start cost is negligible.
    fire_on_activation: true
    prompt: |
      @primitive: TrackRegime()
    display_name: "Regime Tracker"

  # ── track-universe — refresh ticker fundamentals ─────────────────────────
  # ADR-271 Thread A: migrated to mechanical mode. Deterministic Python
  # fetches 1Day bars per universe ticker and computes SMA/RSI/ATR/volume
  # indicators; zero LLM cost; the Reviewer reads each {TICKER}.yaml at
  # signal-evaluation time.
  #
  # Was judgment-mode pre-ADR-271; the cold-start audit 2026-05-13 showed
  # the LLM specialist exited early without writing per-ticker substrate
  # (brief-composition gap). The mechanical primitive eliminates that
  # failure class entirely.
  - slug: track-universe
    # ADR-268: three RTH snapshots — post-open settle, midday, pre-close.
    schedule:
      - "@market_open + 15min"     # 09:45 ET — 15 min after open, price discovery settled
      - "@market_open + 3h"        # 12:30 ET — midday
      - "@market_close - 1h"       # 15:00 ET — 1h before close
    mode: mechanical
    # ADR-270: fire at activation so per-ticker snapshots exist before
    # signal-evaluation's first fire.
    fire_on_activation: true
    prompt: |
      @primitive: TrackUniverse()
    display_name: "Universe Tracker"

  # ── signal-evaluation — evaluate signals + inline ProposeAction ────────────
  # ADR-296 v2 D3: Reviewer does not self-invoke. The previous pattern
  # ("FireInvocation(slug='trade-proposal')" inside this prompt) dissolved
  # when FireInvocation left REVIEWER_PRIMITIVES. The trade-proposal
  # recurrence is deleted; its sizing + emission logic moves inline into
  # signal-evaluation's prompt. The Reviewer evaluates signals AND emits
  # ProposeAction(...) inline when conditions warrant — one judgment
  # cycle, one decision, no self-fire.
  - slug: signal-evaluation
    # ADR-268: post-open after price discovery settles.
    schedule: "@market_open + 15min"   # 09:45 ET
    mode: judgment
    # ADR-269: Reviewer reads pre-computed ticker.yaml snapshots (no broker
    # call for signal eval), but may dispatch a specialist to verify open
    # positions via Alpaca for exit-trigger checks. write_trading needed so
    # downstream ExecuteProposal has the right capability when AUTONOMY
    # ceiling permits auto-execute.
    required_capabilities: [read_trading, write_trading]
    prompt: |
      What you produce (ADR-296 v2 D3 — single judgment cycle, inline emit):
      - signal-entry rows appended to signals/{signal_id}.yaml when entry conditions match
      - ProposeAction(...) emitted INLINE when any entry signal OR exit trigger fires
      - stand-down written to /workspace/review/judgment_log.md when neither path triggers

      Step 1 — Evaluate signals. For each ticker in
      /workspace/context/trading/_universe.yaml:
        - Read the latest snapshot at /workspace/context/trading/{ticker}.yaml.
        - Apply each signal's boolean rule from
          /workspace/context/_shared/_operator_profile.md.
        - When a signal fires, append a signal entry to
          /workspace/context/trading/signals/{signal_id}.yaml with timestamp,
          ticker, conditions snapshot, and sizing inputs.

      Step 2 — Check open positions for exit triggers. Read
      /workspace/context/portfolio/positions/{ticker}.yaml against the
      "Hard exit triggers" section in /workspace/review/principles.md —
      stop hit, target reached, max-hold reached.

      Step 3 — Before sizing entry proposals, read
      /workspace/context/trading/_regime.yaml. Two checks:
        (a) Freshness: if last_updated > 24h OR data_stale=true, do NOT
            emit entry proposals — note in reasoning + stand down on entries
            (exits still emit per the mandatory-close rule below).
        (b) Active state: if vix_regime_active=true, multiply each entry's
            position_size by 0.5 (Signal 5 portfolio scalar).

      Step 4 — Emit proposals inline. For each fired entry signal:

        ProposeAction(
          action_type="trading.submit_order_paper",
          inputs={
            signal_id: "<must match the fired signal>",
            ticker: "<...>",
            direction: "long|short",
            entry_price: <...>,
            stop_loss: <...>,
            target: <...>,
            position_size: <post-regime-scalar — the final number to broker>,
            sizing_formula_trace: "<formula + numbers including regime_scalar line>",
            entry_rule_trace: "<which signal conditions matched>",
          },
          ...
        )

      For each exit trigger (mandatory per principles.md "Hard exit triggers"):

        ProposeAction(
          action_type="trading.close_position",
          inputs={
            ticker: "<...>",
            exit_reason: "stop_hit|target_reached|max_hold_reached",
            position_state_trace: "<substrate snapshot that triggered close>",
          },
          ...
        )

      **Silent stand-down on an exit trigger is forbidden** per principles.md.
      For exit triggers: emit ProposeAction(action_type="trading.close_position",
      ...) AND ReturnVerdict(verdict="approve", reasoning="<persona-voice
      naming the trigger + position>", confidence="high").

      For entries: when a signal fires + sizing passes, emit ProposeAction(
      action_type="trading.submit_order_paper", ...) AND ReturnVerdict(
      verdict="approve", reasoning="<persona-voice naming the signal +
      sizing math>", confidence="high"|"medium").

      Otherwise, when neither entries nor exits fire: WriteFile
      /workspace/review/standing_intent.md per kernel persona frame, THEN
      ReturnVerdict(verdict="stand_down", reasoning="<persona-voice noting
      no entries/exits + what you're watching for in the next cycle>",
      confidence="medium"). Text-only response without ReturnVerdict is
      forbidden — the cycle does not close cleanly without it, and a
      capital-judgment recurrence that fails to close is the worst-shape
      outcome (worse than approve, worse than stand_down, because the
      operator has no record of what the judgment was).
    display_name: "Signal Evaluator"

  # ── mirror-signal-state — compact substrate for Reviewer wake envelope ──
  # ADR-281 Derived Principle 19: the Reviewer's wake envelope reads
  # substrate; it does not derive state at prompt-assembly time. This
  # mechanical recurrence projects per-signal YAML state files into a
  # compact `_signals_summary.md` substrate file that the wake envelope
  # reads as a normal `path` entry (per MANIFEST.substrate_abi.reviewer_wake_envelope).
  # Replaces the deleted ENVELOPE_SUMMARIZERS["signal_files"] kernel
  # function. World-mirror role per the six-role taxonomy.
  - slug: mirror-signal-state
    schedule: "@every 1min during regular_hours"   # ADR-268: every minute during RTH
    mode: mechanical
    # ADR-270: fire at activation so _signals_summary.md exists before
    # the first reactive Reviewer wake. Mechanical mode means this runs
    # in <1s with no LLM cost.
    fire_on_activation: true
    prompt: |
      @primitive: MirrorSignalState(
        source="context/trading/signals/*.yaml",
        write_to="context/trading/_signals_summary.md",
        diff_aware=true
      )
    display_name: "Signals Summary Mirror"

  # ADR-296 v2 D3: trade-proposal recurrence DELETED. Its emission logic
  # inlined into signal-evaluation's prompt (above). The reactive
  # `schedule: null` + FireInvocation chain pattern dissolves when the
  # Reviewer loses self-invocation authority — one judgment cycle, one
  # decision, no self-fire.

  # ADR-275: pre-market-brief, weekly-performance-review, and
  # quarterly-signal-audit were judgment-cadence entries previously
  # scaffolded here. Under FOUNDATIONS v8.5 Axiom 4 + Derived Principle
  # 18, deliverable cadence is Reviewer-authored — not bundle-scaffolded.
  # The operator declares preferences for these deliverables in
  # /workspace/context/_shared/_preferences.yaml. The Reviewer reads
  # _preferences.yaml at every wake and authors Schedule(action="create"|
  # "update"|"archive") for declared preferences. The capability specs
  # remain in /workspace/specs/ (pre-market-brief.md, weekly-performance-
  # review.md, quarterly-signal-audit.md) — Claude Code skills.md analog.

  # ── outcome-reconciliation — daily money-truth reconcile ─────────────────
  # The reconciler is deterministic Python (services.outcomes.reconciler.
  # reconcile_user) that pulls fills from Alpaca, recovers signal attribution
  # via the client_order_id round-trip (P&L unification 2026-05-12), and
  # folds into _money_truth.md with by_signal bucketing. The recurrence
  # prompt is the wake-vehicle that triggers the reconciler through
  # invocation_dispatcher.
  - slug: outcome-reconciliation
    # ADR-268: 1h after RTH close — fills + clearing settled. Previously
    # "0 5 UTC" = 00:00 ET (midnight, multiple hours after close).
    schedule: "@market_close + 1h"   # 17:00 ET
    mode: judgment
    # ADR-269: deterministic reconciler pulls fills + orders from Alpaca;
    # specialist consultation requires market-data access for fill
    # verification.
    required_capabilities: [read_trading]
    prompt: |
      Reconcile yesterday's executed proposals against platform events.
      The deterministic reconciler in services.outcomes.reconciler.reconcile_user
      handles this end-to-end:

        1. Pulls executed orders + fills from the trading platform_connection
           since the last reconciliation timestamp.
        2. Recovers signal attribution via Alpaca's client_order_id field
           (our proposal.id round-trips through Alpaca per the P&L
           unification refactor; the reconciler reads it back and joins
           against action_proposals to extract signal_id from inputs).
        3. Folds outcomes into /workspace/context/trading/_money_truth.md
           — frontmatter rolling 7d/30d/90d, by_signal per-signal windows,
           by_action_type, by_provider; body narrative with per-signal
           attribution section. Schema in /workspace/specs/performance-rollup.md.
        4. Regenerates /workspace/context/_money_truth_summary.md as the
           cross-domain rollup the daily-update briefing reads.

      Close the cycle: WriteFile /workspace/review/standing_intent.md
      noting which open positions you're watching for fills + the next
      reconciliation window (per ADR-284). THEN ReturnVerdict(verdict=
      "stand_down", reasoning="<persona-voice summary of today's
      reconciliation + what you're watching for>", confidence="medium")
      — required even when no fills occurred in the window. The
      deterministic reconciler runs regardless; your judgment cycle
      produces forward-looking substrate AND closes via ReturnVerdict
      on every fire. Text-only response without ReturnVerdict is
      forbidden.
    display_name: "Outcome Reconciliation"

  # ADR-275: morning-calibration, morning-reflection, proposal-cleanup,
  # and narrative-digest were Reviewer-introspection / housekeeping
  # judgment-cadence entries previously scaffolded here. Under
  # FOUNDATIONS v8.5 Axiom 4 + Derived Principle 18, ALL judgment
  # cadence (introspection AND housekeeping AND deliverable production)
  # is Reviewer-authored — not bundle-scaffolded.
  #
  # On its first wake (seeded by operator-addressed turn after
  # activation), the Reviewer observes Operating Context (now + market
  # state + tenure) and decides — from first-principled judgment —
  # what cadence to author for reflection, calibration, housekeeping.
  # Every Reviewer-authored Schedule(action="create"|"update"|...) call
  # is attributed `reviewer:ai:reviewer-sonnet-v8` via dispatch-layer
  # injection (ADR-274). The audit trail is workspace_file_versions on
  # _recurrences.yaml (intent) + execution_events (outcome).
