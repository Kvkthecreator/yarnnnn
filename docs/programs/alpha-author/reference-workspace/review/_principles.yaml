---
tier: authored
prompt: "What are your machine-enforced editorial thresholds? high_impact_threshold_routes_value crosses outcome events to feedback.md routing per ADR-181."
---
# _principles.yaml — machine-parsed review thresholds (ADR-254)
# Read by review_policy.load_principles() via yaml.safe_load.
# For the Reviewer's full reasoning framework, see principles.md.
#
# NOTE: ceiling_categories was folded into _autonomy.yaml per ADR-261 D5.
# Don't add execution gating here — read from _autonomy.yaml.

authored:
  # High-impact threshold for routing outcome events to task feedback.md
  # per ADR-181. For alpha-author, "high-impact" means corpus events the
  # operator should personally see — e.g., a corpus-level voice-drift
  # signal across 4+ recent pieces, a continuity-break detected post-hoc,
  # or a publication outcome with unusual audience response.
  high_impact_voice_drift_recent_pieces: 4          # 4+ recent pieces flagged for same drift → high-impact
  high_impact_continuity_break_detected_posthoc: true  # any post-hoc continuity break → high-impact
  high_impact_cadence_intervals_missed: 2           # 2+ missed intervals → high-impact
  high_impact_audience_signal_zscore: 2.0           # audience response 2σ from rolling mean (when audience-bearing) → high-impact

audience:
  # When audience-bearing capabilities are connected (ADR-283 step 2),
  # high-impact thresholds for audience-signal slices of _signal.md.
  high_impact_engagement_zscore: 2.0    # engagement event 2σ from rolling mean → high-impact
  high_impact_churn_threshold_pct: 3.0  # weekly churn ≥ 3% → high-impact

# Per-category sample-size thresholds before auto-approve auto-promotes
# (Phase 1+). Operator can tune per-category once they've watched the
# bootstrap-window calibration data.
sample_size_minimum_for_bounded_promotion: 10
