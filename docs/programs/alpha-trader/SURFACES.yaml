schema_version: 1

# alpha-trader composition manifest. Read by the compositor
# (ADR-225 Phase 1+2 shipped, amended by ADR-228 cockpit reshape).
# Speaks ADR-198 archetypes (Document/Dashboard/Queue/Briefing/Stream)
# × ADR-214 4-tab nav (chat/work/agents/files).
#
# All bindings are filesystem paths. Components must exist in the
# system component library (web/components/library/) at compositor
# render time.

tabs:
  work:
    list:
      pinned_tasks: [trading-signal, portfolio-review]
      group_default: output_kind
      filters_default:
        output_kind: produces_deliverable

      # ADR-228 — four-face cockpit. The cockpit is the operation,
      # rendered. Bundles fill each face with their domain shape;
      # bundles cannot reorder or omit faces. The four faces, fixed
      # order:
      #   1. Mandate         — what we're trying to do, with what permissions
      #   2. Money truth     — where the account stands right now
      #   3. Performance     — how we're doing against the mandate
      #   4. Tracking        — what's in motion
      #
      # Phase 1 of ADR-228 (this commit) wires the kernel-default
      # substrate-fallback path. Platform-live binding for Money Truth
      # (Alpaca account snapshot) ships in Commit 3; bundle-shaped
      # Tracking operational state (positions table) ships in Commit 4.
      cockpit:
        money_truth:
          substrate_fallback: /workspace/context/portfolio/_performance.md
        performance:
          attribution_source: /workspace/context/portfolio/_performance.md

    detail:
      middles:
        # ADR-228 note: portfolio-review and trading-signal detail
        # middles still reference component names that were used by
        # the cockpit (PerformanceSnapshot, PositionsTable, etc.).
        # Those component files were deleted in ADR-228 Commit 1.
        # Detail-mode rendering for these tasks renders the registry's
        # "component not registered" amber warning until ADR-228
        # Commit 4 ships the bundle-aware operational state components
        # that replace them. Cockpit and detail-middle wiring are
        # orthogonal — the cockpit four-face render is fully green.
        - match: { task_slug: portfolio-review }
          archetype: dashboard
          bindings:
            performance: /workspace/context/portfolio/_performance.md
            positions: /workspace/context/portfolio/_positions.md
            risk: /workspace/context/portfolio/_risk_state.md
          components:
            - kind: PerformanceSnapshot
              source: performance
            - kind: PositionsTable
              source: positions
            - kind: RiskBudgetGauge
              source: risk
          chrome:
            metadata:
              kind: TradingPortfolioMetadata
              source: performance
            actions:
              - kind: KernelDeliverableActions

        - match: { task_slug: trading-signal }
          archetype: queue
          bindings:
            proposals: /action_proposals
          components:
            - kind: TradingProposalQueue
              source: proposals
              filters:
                proposal_type: trading
                status: pending

  agents:
    list:
      featured: [trading-bot, reviewer]
    reviewer:
      principles_default: reference-workspace/review/principles.md

  context:
    list:
      featured_domains: [trading, portfolio]

chat_chips:
  - "Walk me through today's signals"
  - "What's my risk budget right now?"
  - "Did anything trigger overnight?"
  - "Show me last week's expectancy by signal"

phase_overlays:
  observation:
    tabs:
      work:
        list:
          banner: "Paper-only. Live trading gated on AUTONOMY.md flip."
  paper_discipline:
    tabs:
      work:
        list:
          banner: "Phase 1 — Paper Discipline. 90-day process-obedience window."
  live_float:
    tabs:
      work:
        list:
          banner: "Phase 2 — Live Float. Every order requires Reviewer approval."
  calibrated_autonomy:
    tabs:
      work:
        list:
          banner: "Phase 3 — Calibrated Autonomy. Selective auto-approval active per principles.md."
  self_funding:
    tabs:
      work:
        list:
          banner: "Phase 4 — Self-Funding Validated."
