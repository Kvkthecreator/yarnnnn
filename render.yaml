# YARNNN v5 - Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  # FastAPI Backend
  - type: web
    name: yarnnn-api
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r api/requirements.txt
    # cwd = api/ (matches the live service; some reads resolve relative to the
    # app dir). --limit-max-requests recycles the single uvicorn worker after N
    # requests so the process restarts clean, bounding any residual RSS creep
    # regardless of source (belt-and-suspenders atop MALLOC_TRIM + the client-
    # teardown fixes). At ~0.5 req/s that's ≈ one clean restart per 5–6h; uvicorn
    # drains in-flight requests first, so SSE streams finish before the recycle.
    # See docs/infrastructure/memory-and-client-lifecycle.md.
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT --limit-max-requests 10000
    envVars:
      # Memory discipline (2026-06-05): glibc malloc retains freed per-thread
      # arenas under threaded request churn (httpx pools) and is slow to return
      # them to the OS — the amplifier behind the 512 MiB OOM creep. Trim
      # aggressively so freed memory is reclaimed, turning slow-climb-to-OOM into
      # a stable sawtooth. Defense-in-depth atop the client-teardown fix in
      # services/supabase.py + working_memory.py. See
      # docs/infrastructure/memory-and-client-lifecycle.md.
      - key: MALLOC_TRIM_THRESHOLD_
        value: "100000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "YARNNN <noreply@yarnnn.com>"
      # Integration OAuth - Slack
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      # Integration OAuth - Notion
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      # Integration OAuth - Google/Gmail (ADR-029)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    healthCheckPath: /health

  # ADR-417: yarnnn-output-gateway (the render service) DELETED — generation is
  # rented, not owned; yarnnn hosts no generation/rendering engine. Compose
  # (section→HTML) moved in-API as a pure-Python library. Service parity 4 → 3.

# Cron Jobs
crons:
  # Unified Scheduler (ADR-017 + ADR-018)
  # Processes: recurring deliverables, proactive reviews, import jobs, memory extraction
  # Runs every 5 minutes to catch due items
  - name: unified-scheduler
    schedule: "*/5 * * * *"
    command: cd api && python -m jobs.unified_scheduler
    region: singapore
    envVars:
      # Memory discipline (2026-06-05): glibc arena trim — same rationale as the
      # API service. The scheduler churns Supabase clients per tick across the
      # thread pool. See docs/infrastructure/memory-and-client-lifecycle.md.
      - key: MALLOC_TRIM_THRESHOLD_
        value: "100000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "YARNNN <noreply@yarnnn.com>"
      # Integration OAuth - for import jobs (ADR-029)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false

  # ADR-153: Platform Sync Scheduler DELETED — platform_content sunset.
  # Platform data flows through tasks into context domains.
