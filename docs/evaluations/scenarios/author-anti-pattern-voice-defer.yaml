scenario_schema_version: 1
scenario: author-anti-pattern-voice-defer
description: |
  Validate the Reviewer's defer-with-directive path on a defective draft.
  Seeds a fresh authored piece from the anti-pattern-voice template
  (list-of-three openers, "at the end of the day", "absolutely pivotal",
  intensifier adverbs, "in conclusion" closer), flips status: draft →
  ready_for_review to fire the pre-ship-audit substrate-event hook,
  waits for Reviewer wake.

  This is the negative-case companion to author-clean-voice-approve.
  Same setup shape, defective content; verdict should flip from
  approve to defer (or reject) with a directive in standing_intent.md
  citing the specific anti-patterns.

  Eval-suite dimensions targeted:
    - Behavior: P1 (fired-correctly) — defer/reject verdict + judgment_log
      + directive in standing_intent.md
    - Posture: M1 — directive grounds in MANDATE voice clause (the
      voice anti-patterns being flagged should trace to MANDATE's
      declared voice criterion, not just _voice.md)
    - Substrate usage: trace-completeness ≥ 0.8 — verdict traces to
      content.md read + _voice.md read + MANDATE.md voice clause
    - Cost: ≤ $1 per eval

  Extracted from canary_phase4_v3/v4/v5 imperative pattern (same
  content, same probe shape). Migrated to YAML scenario form per the
  evaluation-infrastructure consolidation 2026-05-27.

persona: yarnnn-author

setup:
  - seed_draft:
      slug: eval-anti-pattern-voice-defer
      template: anti-pattern-voice
      title: "Eval — Anti-Pattern Voice Defer Path"

turns:
  - flip_frontmatter_field:
      path: /workspace/context/authored/eval-anti-pattern-voice-defer/profile.md
      field: status
      value: ready_for_review
      message: |
        author-anti-pattern-voice-defer eval — CANARY transition draft →
        ready_for_review (fires pre-ship-audit substrate-event hook).
        Expected verdict: DEFER with directive citing voice anti-patterns
        (list-of-three openers, "absolutely pivotal", "in conclusion").
    expect:
      - substrate_event_wake_within_5min
      - reviewer_judgment_log_entry
      - verdict_defer_or_reject
      - standing_intent_cites_voice_anti_patterns

capture:
  - revision_chain
  - decisions_md
  - action_proposals
  - token_usage_by_caller
  - all_session_messages
