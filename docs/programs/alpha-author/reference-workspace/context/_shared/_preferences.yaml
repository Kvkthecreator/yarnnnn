---
tier: canon
note: "Operator-authored cadence preferences (ADR-275). Forked to /workspace/context/_shared/_preferences.yaml at activation. The Reviewer reads this every wake and authors Schedule(action='create'|'update'|'archive') for declared preferences."
---
# _preferences.yaml — operator cadence preferences (ADR-275)
#
# This file declares the operator-facing deliverables the operator wants
# produced on cadence. The Reviewer reads this every wake and authors
# actual scheduled recurrences via the Schedule primitive to honor
# declared preferences. The Reviewer NEVER writes to this file — it is
# the operator's declaration of *what* and *when*; the Reviewer decides
# *how* (content judgment) and authors the actual cadence.
#
# Edit `cadence` to change when a deliverable is produced.
# Edit `active: false` to pause a deliverable without deleting the
# preference (the Reviewer will pause or archive the corresponding
# scheduled recurrence on its next wake).
#
# `cadence` supports plain UTC cron and `null` (no preference; Reviewer
# authors cadence from judgment if it deems the deliverable worth
# producing). alpha-author does not anchor to market hours, so semantic
# `@market_*` schedules are not used.
#
# `spec` is the path to the canonical capability spec — the Reviewer
# reads it when producing this deliverable (Claude Code skills.md
# analog).

deliverable_preferences:
  - slug: weekly-corpus-review
    spec: /workspace/specs/weekly-corpus-review.md
    cadence: "0 18 * * 0"      # Sunday 18:00 UTC
    description: "Weekly synthesis of corpus state — voice fingerprint stability, continuity threads, cadence health, audience response when audience-bearing"
    active: true

  - slug: quarterly-voice-audit
    spec: /workspace/specs/quarterly-voice-audit.md
    cadence: "0 18 31 3,6,9,12 *"   # Quarter-end at 18:00 UTC
    description: "Quarter-end voice fingerprint audit — does the declared _voice.md still match the corpus, or has voice evolved enough that the declaration needs operator-authored update?"
    active: true


# =============================================================================
# operator_notifications — operator-addressing email opt-ins (ADR-299)
# =============================================================================
#
# Operator-addressing capabilities (per ADR-299 D1, operator-addressing class)
# differ from deliverable_preferences above in three ways:
#   - Addressee is the operator's own inbox (auth.users.email), not third-
#     party / audience. Tool `platform_email_send_to_operator` enforces this
#     structurally — addressee resolves at send-time, no `to:` field accepted.
#   - Routing is observability (per ADR-299 D4), NOT consequential action.
#     `_preferences.yaml` opt-in IS the standing operator authorization;
#     AUTONOMY `delegation: manual` does NOT block these (operator already
#     approved by declaring the preference).
#   - Wire-gate still applies: requires an active Resend connection per
#     ADR-192 Phase 4. When Resend isn't connected, the
#     `platform_email_send_to_operator` tool degrades silently from the
#     Reviewer's surface — no leak of non-functional tool into prompts.
#
# Each entry shape:
#   - slug:        stable identifier (e.g. daily_corpus_state_update)
#   - description: what the Reviewer composes + sends
#   - cadence_hint: when the Reviewer should consider sending. The Reviewer
#                   does NOT auto-fire on cadence — it sends when the
#                   judgment cycle produces material worth surfacing AND
#                   the cadence hint is honored. Operator-tunable.
#   - active:      false to pause without deleting the preference
#
# Default-off discipline: each entry ships `active: false` so the bundle
# default does NOT spam any operator. The operator flips `active: true`
# on the preferences they want, per workspace. Multi-workspace operators
# tune notifications independently to avoid email fatigue (per ADR-299
# Scenario 9 stress-test).

operator_notifications:
  - slug: daily_corpus_state_update
    description: "Daily morning email summarizing yesterday's audit verdicts, drafts pending review, voice-drift signals from the last 24h, and pieces awaiting publication. Reviewer composes from /workspace/review/judgment_log.md + /workspace/review/standing_intent.md."
    cadence_hint: "Daily at 07:00 UTC (operator-tunable)"
    active: false

  - slug: pre_ship_audit_summary
    description: "Email sent immediately after a pre-ship-audit fires on a draft transitioning to ready_for_review — operator gets the Reviewer's verdict (approve / defer / reject) + reasoning summary while context is fresh, so they can iterate quickly on a deferred draft."
    cadence_hint: "Event-driven — fires when pre-ship-audit hook resolves"
    active: false
