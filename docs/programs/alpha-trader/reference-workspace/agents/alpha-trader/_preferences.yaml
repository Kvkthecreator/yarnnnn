---
tier: canon
note: "Operator-authored cadence preferences (ADR-275). Forked to /workspace/agents/alpha-trader/_preferences.yaml at activation. The Reviewer reads this every wake and authors Schedule(action='create'|'update'|'archive') for declared preferences."
---
# _preferences.yaml — operator cadence preferences (ADR-275)
#
# This file declares the operator-facing deliverables the operator wants
# produced on cadence. The Reviewer reads this every wake and authors
# actual scheduled recurrences via the Schedule primitive to honor
# declared preferences. The Reviewer NEVER writes to this file — it is
# the operator's declaration of *what* and *when*; the Reviewer decides
# *how* (content judgment) and authors the actual cadence.
#
# Edit `cadence` to change when a deliverable is produced.
# Edit `active: false` to pause a deliverable without deleting the
# preference (the Reviewer will pause or archive the corresponding
# scheduled recurrence on its next wake).
#
# `cadence` supports the same shapes as _recurrences.yaml entries:
#   - plain UTC cron: "0 18 * * 0"
#   - ADR-268 semantic schedules: "@market_open - 30min",
#     "@market_close + 1h", "@every 5min during regular_hours"
#   - list of either (multiple fires per day)
#   - null (no preference; Reviewer authors cadence from judgment if
#     it deems the deliverable worth producing)
#
# `spec` is the path to the canonical capability spec — the Reviewer
# reads it when producing this deliverable (Claude Code skills.md
# analog).

deliverable_preferences:
  - slug: pre-market-brief
    spec: /workspace/operation/specs/pre-market-brief.md
    cadence: "@market_open - 30min"
    description: "Pre-market brief 30 minutes before RTH open (weekdays)"
    active: true

  - slug: weekly-performance-review
    spec: /workspace/operation/specs/weekly-performance-review.md
    cadence: "0 18 * * 0"
    description: "Weekly performance synthesis every Sunday at 18:00 UTC"
    active: true

  - slug: quarterly-signal-audit
    spec: /workspace/operation/specs/quarterly-signal-audit.md
    cadence: "0 18 31 3,6,9,12 *"
    description: "Quarter-end signal discipline audit at 18:00 UTC on quarter-end day"
    active: true


# =============================================================================
# operator_notifications — operator-addressing observability opt-ins (ADR-299)
# =============================================================================
#
# Per ADR-299 (rewrite 2026-05-27), `platform_email_send_to_operator` is
# operator-addressing system infrastructure — the system Resend wire
# (api/jobs/email.py, RESEND_API_KEY env var), the same wire ADR-040
# notifications + ADR-202 daily-update emails already use, exposed as an
# LLM-invokable tool. It is NOT a workspace capability and does NOT
# require operator Resend OAuth setup. The infrastructure is environment-
# deployed; the tool is always available to the agent path.
#
# Differs from deliverable_preferences above in three ways:
#   - Addressee is the operator's own inbox (auth.users.email at send-time),
#     not third-party / audience. The tool enforces this structurally —
#     no `to`, `cc`, `bcc`, `from_email`, `from_name` fields accepted.
#   - Authorization is observability (ADR-299 D5), NOT consequential
#     action. The opt-in below IS the standing approval; AUTONOMY
#     `delegation: manual` does NOT block these. AUTONOMY scoping is for
#     third-party-affecting writes only (capital actions for alpha-trader
#     still flow through should_auto_apply) — same model ADR-040 and
#     ADR-202 already use for the operator-addressing channel.
#   - No platform_connections gate. The system Resend wire is kernel
#     plumbing; operators do not connect Resend to receive these emails.
#
# Each entry shape:
#   - slug:        stable identifier (e.g. daily_pnl_reconciliation)
#   - description: what the Reviewer composes + sends
#   - cadence_hint: when the Reviewer should consider sending. The Reviewer
#                   does NOT auto-fire on cadence — it sends when the
#                   judgment cycle produces material worth surfacing AND
#                   the cadence hint is honored. Operator-tunable.
#   - active:      false to pause without deleting the preference
#
# Default-off discipline: each entry ships `active: false` so the bundle
# default does NOT spam any operator. The operator flips `active: true`
# on the preferences they want, per workspace. Multi-workspace operators
# tune notifications independently to avoid email fatigue.

operator_notifications:
  - slug: daily_pnl_reconciliation
    # ADR-317: this opt-in now has a live consumer — the post-judgment
    # dispatcher (api/services/daily_pnl_email.py) fires after the
    # outcome-reconciliation wake completes, reads _money_truth.md, and
    # sends the email. The Reviewer does NOT send it (email tool is
    # excluded from REVIEWER_PRIMITIVES); the Reviewer's judgment triggers,
    # the dispatcher sends. Flip active: true to receive the email.
    description: "End-of-day email summarizing today's outcome-reconciliation: realized + unrealized P&L, fills count, signal attribution, calibration deltas vs declared expectancy. A post-judgment dispatcher (ADR-317) composes from /workspace/operation/trading/_money_truth.md after the @market_close + 1h outcome-reconciliation fire and sends via the system Resend wire."
    cadence_hint: "Daily — fires immediately after outcome-reconciliation settles (@market_close + 1h)"
    active: false

  - slug: signal_fire_alert
    description: "Email sent when signal-evaluation fires a high-confidence ProposeAction — operator gets the proposal summary + sizing math + Reviewer reasoning even before they next open the cockpit Queue. Useful when operator is operating remotely or wants out-of-band capital-action awareness."
    cadence_hint: "Event-driven — fires when ProposeAction emits with confidence >= signal-specific threshold"
    active: false

  - slug: regime_state_change_alert
    description: "Email sent when track-regime detects a VIX-regime flip (Signal 5 transition) — operator gets the alert that portfolio scalar has changed, sized positions are now 0.5x or 1x effective starting next entry. Material for risk-aware operators."
    cadence_hint: "Event-driven — fires when /workspace/operation/trading/_regime.yaml vix_regime_active transitions"
    active: false
