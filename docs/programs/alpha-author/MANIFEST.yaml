schema_version: 1
slug: alpha-author
title: alpha-author
# 2026-06-04: deferred → active. The Author* Home components shipped
# (web/components/library/programs/alpha-author/), and the bundle resolves
# for workspaces via the MANDATE.md activation marker (connection-less
# bundle path in bundle_reader.bundles_active_for_workspace). With status
# deferred the bundle was excluded from all_active_bundles(), so an
# activated alpha-author workspace fell through to the empty-Home CTA.
status: active
# ADR-292: bundle version stamp. See alpha-trader/MANIFEST.yaml header
# comment for the discipline. Bumped on any reference-workspace/ or specs/
# change. Operator update flow consults this for "Bundle update available."
version: 2026-06-23.2
date_created: 2026-05-15
date_updated: 2026-06-23

tagline: Operator-authored corpus with persistent editor seat. Substrate-continuity archetype — accumulated work that compounds across cadence + voice + audience.

# ADR-327: minimum_pace removed — pace retires (frequency is the Reviewer's
# allocation problem within the dollar budget, not an operator dial). Cost
# governance is _budget.yaml (kernel default $50/monthly). No pace gate.

# ADR-283: alpha-author bundle, substrate-continuity archetype.
# Companion of FOUNDATIONS Axiom 8 (Ground-Truth Substrate, post-ADR-282).
# alpha-trader exercises the autonomous-execution archetype (Reviewer-as-
# decision-maker, fast loop, single-signal calibration). alpha-author
# exercises the substrate-continuity archetype (Reviewer-as-editor-and-
# continuity-guardian, slower multi-signal calibration, corpus-as-moat).

# Per ADR-282 + ADR-283 D4: alpha-author's ground-truth substrate is
# multi-signal — internal corpus coherence (always present) + audience
# signal (when audience-bearing) + revenue signal (when commerce-bearing).
# The canonical per-domain filename is `_signal.md` (instance-level
# vocabulary; the kernel-level concept is "ground-truth substrate" per
# FOUNDATIONS Axiom 8). Same file shape across domains; signal mix varies
# by what's connected.
oracle:
  shape: multi_signal_coherence
  source: corpus_coherence + audience_engagement + commerce_revenue
  latency: continuous_internal_to_weekly_external
  irreversibility: partially_reversible    # published content can be unpublished or revised, but audience perception persists
  custody: operator_authored               # corpus is operator-owned at all times
  capital_threshold_usd: 0                 # no capital floor — pre-monetization workspaces are first-class
  attribution: per_piece_signal_attribution

# alpha-author is medium-agnostic and cadence-agnostic at the bundle level.
# Workspaces declare their specific publishing surface (LinkedIn, X,
# newsletter, podcast, screenplay) via persona overrides. The bundle's
# market_context is therefore minimal — it does not anchor to a market
# calendar like alpha-trader does. Operators with cadence-sensitive
# publishing (weekly newsletter, daily founder content) declare their
# cadence in _preferences.yaml; the Reviewer authors corresponding
# Schedule primitive calls per ADR-275.
market_context:
  exchange: operator_authored
  timezone: operator_local                 # resolved from operator settings at materialize-due time
  trading_days: any                        # publishing happens any day; no market-hour gating

dependencies:
  required:
    - adr: ADR-209          # authored substrate revision chain — every corpus revision attributed
    - adr: ADR-194          # Reviewer-as-editor seat
    - adr: ADR-217          # AUTONOMY.md delegation file
    - adr: ADR-181          # source-agnostic feedback (system-detected drift routes to feedback.md)
    - adr: ADR-202          # action proposal queue (pre-ship audits emit ProposeAction)
    - adr: ADR-282          # Ground-Truth Substrate axiom (kernel-level concept)
    - adr: ADR-283          # alpha-author bundle scope-lock
    - capability: read_uploads
    - capability: websearch
    # ADR-304 D2 (2026-05-27): write_notion capability declaration removed.
    # The operator-comment Notion write (platform_notion_create_comment) is
    # now operator-addressing system infrastructure per ADR-304 D1 —
    # available to every workspace via SYSTEM_INFRASTRUCTURE_TOOLS,
    # no bundle declaration required. The `write_notion` capability key
    # is reserved for future audience-addressing extensions (page creates,
    # block appends to shared workspace pages) per ADR-304 D5; alpha-author
    # may declare those when ADR-283 step 2 (write_notion_pages) ships.
  lean: []
    # ADR-283 Discovery note 2 (2026-05-17): the original `dependencies.lean`
    # list of platform-write capability extensions (write_notion_pages,
    # write_linkedin_post, write_x_post, write_newsletter, read_commerce,
    # write_commerce, read_email) was archetype-leakage — creator-archetype
    # capability assumptions imported into true-author-archetype bundle work.
    # Removed entirely. alpha-author's loop is "author and audit a body of
    # work that compounds." The corpus IS the operation; the operator drafts
    # in their authorship environment of choice; publishing-back-out is
    # operator-side platform usage, not bundle-side architectural commitment.
    # Hypothetical cadence-publishing or audience-bearing variants belong to
    # DIFFERENT BUNDLES per Singular Implementation, not alpha-author
    # expansion. See ADR-283 D7 + Discovery note 2 for the full reasoning.

context_domains:
  - path: authored
    purpose: the corpus — operator's body of authored work
    display_name: Authored
    description: Per-piece entities (one folder per draft or published piece). Voice fingerprint, continuity threads, attribution lineage.
    entity_type: piece
    entity_structure:
      profile.md: |
        # {name}

        ## Type & Status

        ## Voice Fingerprint

        ## Continuity Threads
      content.md: |
        # {name} — Content

        <!-- The piece itself. Drafts evolve; published pieces freeze (still
        editable per ADR-209 revision chain, but with explicit `published_at`
        and stronger Reviewer scrutiny on changes). -->
    synthesis_file: corpus.md
    synthesis_template: |
      # Corpus Overview

      ## Recently Published

      ## In Draft

      ## Voice Fingerprint Status

      ## Continuity Threads (Active)
    tracker_file: _tracker.md
    # ADR-220 + ADR-230 D2: operator-authored canonical reads injected
    # into every Reviewer wake that touches this domain. Accumulated
    # substrate (_signal.md per ADR-282/283; _tracker.md) is written by
    # judgment-mode recurrences (corpus-coherence-check, outcome-
    # reconciliation) at runtime — not authored at activation — so it
    # does NOT belong here.
    authored_substrate:
      - _voice.md          # operator's declared voice fingerprint + anti-patterns
      - _editorial.md      # operator's editorial principles (what gets shipped, what doesn't)

  - path: audience
    purpose: when audience-bearing — per-platform engagement signal, subscriber/follower cohorts, response patterns
    display_name: Audience
    description: Per-platform signal slices. Populated only when publishing-platform capabilities are connected; empty for pre-audience workspaces (Netflix-screenplay shape).
    entity_type: platform
    entity_structure:
      profile.md: |
        # {name}

        ## Platform Type

        ## Subscriber/Follower State

        ## Recent Activity
    synthesis_file: overview.md
    synthesis_template: |
      # Audience Overview

      ## Active Platforms

      ## Recent Signal

      ## Cohort State
    tracker_file: _tracker.md
    # ADR-230 D2: per-platform audience-signal substrate (_signal.md per
    # ADR-282/283) is accumulated by audience-tracking mechanical
    # recurrences (track-linkedin, track-x, track-newsletter — declared
    # in this bundle's _recurrences.yaml but only fire when the
    # corresponding platform_connection is active). NOT authored at
    # activation; first reconciliation creates the empty stub.
    authored_substrate: []

# task_types: DELETED per ADR-263 + ADR-264 cleanup pass.
# All scheduled work flows through _recurrences.yaml; the recurrence's
# `mode` field declares whether it is judgment or mechanical.

capabilities:
  # Kernel-side capabilities the bundle relies on. alpha-author does not
  # declare bundle-private capabilities — every capability listed here is
  # a kernel capability that other programs (alpha-trader, alpha-commerce,
  # future bundles) can also use. Bundle-specific capability extensions
  # (publishing-platform writes) are listed in dependencies.lean and
  # deferred to ADR-283 roadmap step 2.
  - key: read_uploads
    category: tool
    runtime: kernel
    tools:
      - read_workspace_uploads
  - key: websearch
    category: tool
    runtime: external:web
    tools:
      - websearch

  # ADR-353 §15a (2026-06-22): Reddit publishing — the author archetype amended
  # to include publish-and-perceive (ADR-283 D7 reversed; see ADR-283 §amendment
  # + ADR-353 §15b). write_reddit = the audience POST (gated by ADR-307);
  # read_reddit = the PERCEIVE read (comments → audience_signal as OBSERVATION,
  # measure-not-steer §14). The perceive half is load-bearing: it is what makes
  # publishing valid for the author archetype (post → measure → corpus learns),
  # not a send button. Execution is Composio-ONLY (driver_enabled_for("reddit")) —
  # no first-party reddit client exists. These are KERNEL capabilities (declared
  # in api/services/orchestration.py::CAPABILITIES); the bundle DECLARES it needs
  # them, exactly as it could declare read_slack. Connection: a reddit
  # platform_connection (BYO-credentials OAuth, §16) gates surfacing.
  - key: read_reddit
    category: tool
    runtime: external:reddit
    requires_connection: reddit
    feeds: context
    tools:
      - platform_reddit_get_post_comments
  - key: write_reddit
    category: tool
    runtime: external:reddit
    requires_connection: reddit
    feeds: action
    tools:
      - platform_reddit_submit_post

  # ADR-353 §17: Hacker News — NO_AUTH read-only perceive connector. Zero
  # credential (no requires_connection), feeds:context. The HN-discourse perceive
  # read: search what HN is saying about the corpus's topics + read Show HN
  # reception → audience_signal / world-mirror. Pairs with the content strategy's
  # "Show HN" channel (manual post, perceived here). Execution Composio-ONLY.
  - key: read_hackernews
    category: tool
    runtime: external:hackernews
    feeds: context
    tools:
      - platform_hackernews_search_posts
      - platform_hackernews_get_item

  # ADR-304 D2 (2026-05-27): write_notion capability declaration removed.
  # The operator-comment Notion write (platform_notion_create_comment) is
  # now operator-addressing system infrastructure per ADR-304 D1, registered
  # in api/services/platform_tools.py::SYSTEM_INFRASTRUCTURE_TOOLS. It
  # surfaces to YARNNN chat + headless paths unconditionally (does not
  # require this bundle declaration). The `write_notion` capability key is
  # reserved here for future audience-addressing extensions per ADR-304 D5
  # (page creates, block appends to shared workspace pages); ADR-283 step 2
  # tracks the deferred write_notion_pages extension under this namespace.

# ADR-280: Substrate ABI — alpha-author's contract with the kernel for
# substrate topology. Mirrors alpha-trader's MANIFEST shape; declares
# alpha-author's two domains + the Reviewer's wake envelope additions.
substrate_abi:
  schema_version: 1

  # ADR-330 D4 — the program's ground-truth file: the substrate the Reviewer's
  # cadence judgment is calibrated against (the self-improving loop, ADR-327 D6).
  # The kernel calibration mirror (_calibration.md) correlates the Reviewer's
  # cadence-authoring history against outcome quality read from here. The file
  # already exists and already accumulates (declared in path_zones[*].
  # accumulating_files below, surfaced as corpus_signal_md in the wake envelope,
  # written by coherence-check + reconciliation). Before this declaration,
  # bundle_reader.get_ground_truth_for_workspace returned None for alpha-author,
  # so mirror_calibration.py omitted its ground-truth section — the second
  # active program's self-improving loop was structurally dark despite the
  # substrate being present. This one-line declaration lights it up; no mirror
  # code change, no new recurrence, no new writer.
  #
  # `_signal.md` (not `_money_truth.md`) is the canonical filename per ADR-282/
  # ADR-283 D4: the kernel concept is "ground-truth substrate" (Axiom 8); the
  # alpha-author instance filename is `_signal.md` because its ground truth is
  # multi-signal coherence (corpus coherence + audience + revenue), not a single
  # P&L number. alpha-trader's `_money_truth.md` is the trading instance of the
  # same kernel slot. alpha-author's ground truth is inherently MULTI-ATTESTATION
  # (ADR-330 §3): audience-platform-pulled numbers = platform; operator-imported
  # newsletter stats = operator; agent-asserted reads = agent. The recurrence(s)
  # feeding _signal.md stamp `attestation` accordingly — this is exactly why the
  # ADR-330 D2 attestation field is load-bearing for non-trading verticals.
  ground_truth: operation/authored/_signal.md

  # ADR-336 (2026-06-11, enacting ADR-335 D7): the `flows_na.perception`
  # rationale that lived here said "audience watches activate … at which
  # point a `watches:` block replaces this rationale" — this is that block.
  # alpha-author's standing watch is the generic web/RSS transport
  # (TrackWebSources): the operator declares press/industry/interest feeds
  # in _sources.yaml; the track-sources mechanical recurrence distills them
  # into _watch_signal.yaml per the ADR-335 D3 observation contract. The
  # template ships EMPTY sources — empty = deliberate no-op, so the lean
  # uploads+websearch shape stays valid (perception is a flow, never a
  # gate). Uploads + websearch remain rungs 1-2 of context-in primacy
  # (ADR-335 §4); this watch is the rung-4a standing extension.
  watches:
    - id: interest-sources
      shape: web_press_feed
      declaration: operation/authored/_sources.yaml
      recurrence: track-sources
      distills_to: operation/authored/_watch_signal.yaml
    # ADR-335 Crawl-B (D4/D5): the repository standing watch — for an author
    # workspace whose SUBJECT is a code/doc repo (e.g. YARNNN-about-YARNNN).
    # Reads declared repo file paths through a watch-bound MCP transport (GitHub
    # MCP get_file_contents) so the agent authors with verifiable citations to
    # the exact repo path. Ships EMPTY (repo: "", sources: []) — a repo-subject
    # workspace declares its repo; others leave it a no-op. Requires a
    # watch-bound platform_connections row (watch_id set) for the server key.
    - id: repo-sources
      shape: repo_file_read
      declaration: operation/authored/_repo_sources.yaml
      recurrence: track-repo
      distills_to: operation/authored/_repo_signal.yaml
      transport: mcp

  # Path zones this program contributes beyond the kernel-universal set.
  path_zones:
    - path: operation/authored
      role: operator-canon
      purpose: the corpus itself — per-piece entities + voice fingerprint
      authored_files: [_voice.md, _editorial.md]
      accumulating_files: [_signal.md, _tracker.md]
      glob_zones: ["{piece-slug}/profile.md", "{piece-slug}/content.md"]
    - path: operation/audience
      role: operator-canon
      purpose: per-platform audience signal (when audience-bearing)
      accumulating_files: [_signal.md, _tracker.md]
      glob_zones: ["{platform-slug}/profile.md"]

  # Substrate the Reviewer needs pre-loaded at every wake to perceive
  # program state. Universal envelope entries (identity_md, principles_md,
  # mandate_md, autonomy_md, preferences_yaml) are kernel-shipped — this
  # block only declares program-specific additions.
  reviewer_wake_envelope:
    - key: voice_md
      path: operation/authored/_voice.md
      optional: false                 # operator must declare voice fingerprint at minimum
    - key: editorial_md
      path: operation/authored/_editorial.md
      optional: false                 # operator must declare editorial principles at minimum
    - key: corpus_signal_md
      path: operation/authored/_signal.md
      optional: true                  # accumulated by coherence-check + reconciliation — empty before first run
    - key: audience_signal_md
      path: operation/audience/_signal.md
      optional: true                  # accumulated by track-* mechanical recurrences when audience-bearing — empty by default
    # ADR-336: the standing watch's distilled observations join the wake
    # envelope so judgment reads the watch signal as substrate (ADR-281 —
    # zero kernel edits; substrate-aware, transport-blind per ADR-335 D3).
    - key: watch_signal
      path: operation/authored/_watch_signal.yaml
      optional: true                  # empty until the operator declares sources in _sources.yaml
    # ADR-335 Crawl-B: the repository watch's distilled observations join the
    # wake envelope so judgment reads the repo signal as substrate and cites
    # the exact repo path. Empty until a repo-subject workspace declares repo +
    # paths in _repo_sources.yaml (substrate-aware, transport-blind per D3).
    - key: repo_signal
      path: operation/authored/_repo_signal.yaml
      optional: true

activation_preconditions:
  # alpha-author is `status: deferred` per ADR-283 honest-state framing.
  # Activation graduates this from deferred → active when ALL hold:
  - ADR-283 roadmap step 2 (capability extensions — Notion page-write minimum) shipped
  - ADR-283 roadmap step 3 (program-specific cockpit faces at web/components/library/programs/alpha-author/) shipped
  - First dogfood activation against a live operator workspace (kvk's yarnnn-author or netflix-script-author per ADR-283 D5) demonstrates end-to-end Reviewer-as-editor loop

phases:
  - key: accumulation
    label: Phase 0 — Accumulation
    description: Operator authors MANDATE + voice fingerprint + first 30 days of corpus. AUTONOMY manual. Reviewer audits drafts on operator request; does not push to ship.
  - key: cadence_discipline
    label: Phase 1 — Cadence Discipline
    description: 60 days of operator shipping on declared cadence. Voice fingerprint stability calibrated. _signal.md accumulates coherence baseline. AUTONOMY bounded.
  - key: selective_autonomy
    label: Phase 2 — Selective Autonomy
    description: Reviewer pre-ship audits become consultative — operator may flip specific corpus categories to auto-approve (e.g., newsletter weekly edition cleared with voice-audit pass + continuity-audit pass). AUTONOMY bounded with ceiling.
  - key: corpus_compounds
    label: Phase 3 — Corpus Compounds
    description: Corpus reaches operator's chosen success bar (signal-attributable revenue OR recognized voice fingerprint OR demonstrable audience compounding). Substrate moat is structurally real, not just claimed.
current_phase: accumulation

references:
