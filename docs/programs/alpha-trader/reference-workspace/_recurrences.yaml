# /workspace/_recurrences.yaml — alpha-trader bundle (ADR-261 D2 + ADR-263 D1 + ADR-268)
#
# Single canonical recurrences file. The operator can read the entire
# scheduled-work surface in 30 seconds. Per ADR-261 D1 each entry is
# {slug, schedule, mode, prompt} where:
#   - slug:     stable identifier
#   - schedule: plain UTC cron, @-prefixed semantic schedule (ADR-268),
#               a list of either (multiple fires per day), or null (reactive)
#   - mode:     judgment (wakes Reviewer with prompt) | mechanical (executes
#               @primitive: ... directive deterministically; no Reviewer wake)
#               Default at parse time when absent: 'judgment' (legacy compat).
#   - prompt:   Reviewer message (judgment mode) OR @primitive: ... (mechanical mode)
#
# Per ADR-263 D2: cron is part of the environment that fires recurrences;
# the recurrence's `mode` field declares whether the fire wakes the Reviewer.
#
# Per ADR-264: SyncPlatformState is the canonical mechanical primitive that
# mirrors external state into substrate. Mechanical-mode recurrences invoke
# it via @primitive: SyncPlatformState(...) directives.
#
# Per ADR-262 D1: every output path is slug-templated by CONVENTIONS.md;
# every spec referenced by a prompt lives under /workspace/specs/.
#
# Per ADR-268: semantic schedules ("@market_open + 15min",
# "@every 1min during regular_hours") resolve to UTC at materialize-due
# time against this bundle's market_context (declared in MANIFEST.yaml).
# Market-anchored recurrences live in the trading-business section below;
# market-agnostic housekeeping uses plain UTC cron.

recurrences:

  # ── MECHANICAL MIRRORS (ADR-264) — keep substrate fresh, no LLM cost ─────
  # These recurrences run as deterministic Python via SyncPlatformState.
  # They write to substrate at known paths; the Reviewer reads substrate,
  # never broker APIs as primary perception (ADR-264 substrate-canonical
  # world axiom). Diff-aware writes skip when content unchanged — quiet
  # markets produce zero revision noise.

  - slug: track-positions
    schedule: "@every 1min during regular_hours"   # ADR-268: every minute during RTH (9:30-16:00 ET)
    mode: mechanical
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_positions",
        write_to="context/portfolio/positions/{symbol}.yaml",
        iterate_field="positions",
        item_key="symbol",
        diff_aware=true
      )
    display_name: "Position State Mirror"

  - slug: track-account
    schedule: "@every 5min during regular_hours"   # ADR-268: every 5 min during RTH
    mode: mechanical
    # ADR-270: fire at activation so the operator sees account state
    # populated in the cockpit immediately, regardless of RTH timing.
    fire_on_activation: true
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_account",
        write_to="context/portfolio/_account.yaml",
        diff_aware=true
      )
    display_name: "Account State Mirror"

  - slug: track-orders
    schedule: "@every 1min during regular_hours"   # ADR-268: every minute during RTH
    mode: mechanical
    prompt: |
      @primitive: SyncPlatformState(
        tool="platform_trading_get_orders",
        tool_args={"status": "open"},
        write_to="context/portfolio/_orders.yaml",
        diff_aware=true
      )
    display_name: "Open Orders Mirror"

  # ── JUDGMENT RECURRENCES — wake the Reviewer with a prompt ──────────────

  # ── track-regime — refresh portfolio-level regime state ──────────────────
  # Operator declared Signal 5 (VIX regime filter) in _operator_profile.md;
  # _risk.md sets apply_vix_regime_scalar: true. This recurrence is the
  # substrate sensor that makes the predicate live. ADR-271 Thread A:
  # migrated to mechanical mode — deterministic Python computes the regime
  # predicate from VIXY+SPY 1Day bars; zero LLM cost; the Reviewer reads
  # the resulting _regime.yaml at proposal time.
  #
  # Was judgment-mode pre-ADR-271; ADR-263 §"Why this rewrite" named this
  # exact recurrence as the canonical mechanical-vs-judgment mismatch case.
  - slug: track-regime
    # ADR-268: 30 min after RTH close — VIXY's 1Day bar is settled.
    # Fires before next morning's pre-market-brief so the brief reads
    # fresh regime state.
    schedule: "@market_close + 30min"   # 16:30 ET
    mode: mechanical
    # ADR-270: fire at activation so _regime.yaml exists before the
    # first signal-evaluation fire. Mechanical mode means this runs in
    # ~1-2s with no LLM cost, so cold-start cost is negligible.
    fire_on_activation: true
    prompt: |
      @primitive: TrackRegime()
    display_name: "Regime Tracker"

  # ── track-universe — refresh ticker fundamentals ─────────────────────────
  # ADR-271 Thread A: migrated to mechanical mode. Deterministic Python
  # fetches 1Day bars per universe ticker and computes SMA/RSI/ATR/volume
  # indicators; zero LLM cost; the Reviewer reads each {TICKER}.yaml at
  # signal-evaluation time.
  #
  # Was judgment-mode pre-ADR-271; the cold-start audit 2026-05-13 showed
  # the LLM specialist exited early without writing per-ticker substrate
  # (brief-composition gap). The mechanical primitive eliminates that
  # failure class entirely.
  - slug: track-universe
    # ADR-268: three RTH snapshots — post-open settle, midday, pre-close.
    schedule:
      - "@market_open + 15min"     # 09:45 ET — 15 min after open, price discovery settled
      - "@market_open + 3h"        # 12:30 ET — midday
      - "@market_close - 1h"       # 15:00 ET — 1h before close
    mode: mechanical
    # ADR-270: fire at activation so per-ticker snapshots exist before
    # signal-evaluation's first fire.
    fire_on_activation: true
    prompt: |
      @primitive: TrackUniverse()
    display_name: "Universe Tracker"

  # ── falsify-signals — bootstrap research substrate on activation ─────────
  # ADR-270: one-shot research bootstrap. Fires once on bundle activation
  # (no recurring schedule), walks each operator-declared signal against
  # 90 days of historical bars, writes per-signal findings to
  # /workspace/research/findings/{signal_id}.md. The Reviewer reads those
  # findings at proposal time alongside _money_truth.md per principles.md.
  #
  # This is NOT a permanent research function (ADR-270 §"Earned escalation"):
  # operator may FireInvocation manually if they want re-falsification later;
  # if observation shows the work is needed on a regular cadence, a future
  # bundle revision adds a periodic schedule.
  - slug: falsify-signals
    schedule: null   # reactive: fires only on activation + manual FireInvocation
    mode: judgment
    fire_on_activation: true
    # Per-recurrence specialist round budget. 5 signals × 5 tickers × 90d of
    # 1Hour bars is the heaviest sub-call in the bundle:
    #   ~5 rounds: per-ticker bar fetches (batched 1-2 platform calls/round)
    #   ~5 rounds: per-signal aggregate computation across tickers
    #   ~5 rounds: WriteFile per-signal findings file
    #   ~1-2 rounds: synthesis / return
    # ~17 rounds nominal; 20 gives modest headroom for retry on a transient
    # platform failure. Cold-start audit 2026-05-13 showed specialist
    # exhausted at the 5-round global default in ~130s with zero findings
    # written.
    max_rounds: 20
    required_capabilities: [read_trading]
    prompt: |
      What you produce:
      - per-signal historical findings written to
        /workspace/research/findings/{signal_id}.md per the schema in
        /workspace/specs/falsify-signals.md

      Walk every signal declared in
      /workspace/context/trading/_operator_profile.md against 90 days
      of historical bars. For each signal:

        1. Read the signal's trigger, entry, stop_loss, target,
           position_size, and max_hold rules.
        2. For each ticker in /workspace/context/trading/_universe.yaml:
             - Fetch 90 days of 1Hour bars via the Alpaca platform tool.
             - Walk forward bar-by-bar; identify every moment the signal's
               trigger conditions matched.
             - For each trigger, compute synthetic outcome from subsequent
               bars: did stop hit first, target hit first, or max_hold
               reach? Compute R-multiple = (exit - entry) / (entry - stop).
        3. Aggregate per signal across all tickers:
             - sample_size = total triggers
             - win_rate = fraction with positive R-multiple
             - avg_win, avg_loss, expectancy_R
             - Compare to declared baseline in _operator_profile.md
               ("Historical baseline (to establish)" lines).
        4. Write findings to /workspace/research/findings/{signal_id}.md
           with frontmatter (sample_size, win_rate, avg_win_R, avg_loss_R,
           expectancy_R, computed_at, lookback_days, source: replay) and
           a narrative body listing the triggered conditions + outcomes.

      If Alpaca returns insufficient or stale bars for a ticker, skip
      that ticker for that signal and note it in the body; don't fabricate
      outcomes.

      This is bootstrap-only — the Reviewer reads these findings to seed
      its capital-EV reasoning when _money_truth.md is empty (post-fork
      cold start). As live trades accumulate, the Reviewer weights real
      outcomes higher than these synthetic ones per principles.md.
    display_name: "Falsify Signals (Bootstrap)"

  # ── signal-evaluation — evaluate signals against current bars ────────────
  - slug: signal-evaluation
    # ADR-268: post-open after price discovery settles.
    # Previously "5 8 UTC" = 04:05 ET (pre-market, before RTH open — wrong).
    schedule: "@market_open + 15min"   # 09:45 ET
    mode: judgment
    # ADR-269: Reviewer reads pre-computed ticker.yaml snapshots (no broker
    # call for signal eval), but may dispatch a specialist to verify open
    # positions via Alpaca for exit-trigger checks.
    required_capabilities: [read_trading]
    prompt: |
      What you produce:
      - signal-entry rows appended to signals/{signal_id}.yaml when entry conditions match
      - a FireInvocation(slug="trade-proposal") when any entry signal OR exit trigger fires
      - stand-down written to /workspace/review/decisions.md when neither path triggers

      Evaluate the universe against signals declared in
      /workspace/context/_shared/_operator_profile.md on the fresh 1Hour bars
      track-universe just wrote. For each ticker in
      /workspace/context/trading/_universe.yaml:
        - Read the latest snapshot at /workspace/context/trading/{ticker}.yaml.
        - Apply each signal's boolean rule.
        - When a signal fires, append a signal entry to
          /workspace/context/trading/signals/{signal_id}.yaml with timestamp,
          ticker, conditions snapshot, and sizing inputs.

      Also check open positions (read /workspace/context/portfolio/positions/)
      for exit triggers per principles.md "Hard exit triggers" section —
      stop hit, target reached, max-hold reached. When an exit triggers,
      immediately FireInvocation(slug="trade-proposal") with context noting
      the exit shape so the Reviewer proposes close.

      When any entry signal fires, immediately FireInvocation(slug="trade-proposal")
      to hand the signal to the Reviewer for capital judgment. Otherwise
      stand down.
    display_name: "Signal Evaluator"

  # ── trade-proposal — emit Reviewer-gated proposal on signal fire or exit ──
  - slug: trade-proposal
    schedule: null  # reactive — fires on signal trigger via FireInvocation
    mode: judgment
    # ADR-269: Reviewer sizes and emits ProposeAction within its own loop;
    # specialist consultation is rare. write_trading is declared so the
    # downstream ExecuteProposal path has the right capability when
    # AUTONOMY ceiling permits auto-execute.
    required_capabilities: [read_trading, write_trading]
    prompt: |
      A signal fire or exit trigger was just recorded. Read the most recent
      entry in /workspace/context/trading/signals/ (entry path) OR the
      relevant /workspace/context/portfolio/positions/{ticker}.yaml (exit
      path). Decide whether the situation warrants a trade against your
      principles in /workspace/review/principles.md and the operator's risk
      envelope in /workspace/context/_shared/_risk.md.

      Before computing sizing, read /workspace/context/trading/_regime.yaml.
      Two checks:
        1. Freshness: if last_updated is older than 24h OR data_stale is
           true, REJECT this proposal with reason "regime substrate stale
           — re-fire track-regime before trading." Per principles.md
           Hard rejection rule (regime freshness).
        2. Active state: if vix_regime_active is true, the final
           position_size is multiplied by 0.5 (Signal 5 portfolio scalar
           per _operator_profile.md).

      Entry path (signal fired): emit ProposeAction(action_type="trading.submit_order_paper",
      ...) with full sizing math:
        - signal_id (must match the fired signal)
        - ticker
        - direction (long | short)
        - entry_price
        - stop_loss
        - target
        - position_size (post-regime-scalar — the final number that hits the broker)
        - sizing_formula_trace (numbers + formula explanation, including
          one of:
            "regime_scalar: 0.5 (VIX regime active — VIXY=<x> > threshold=<y> AND > sma_20=<z>)"
            "regime_scalar: 1.0 (VIX regime inactive)")
        - entry_rule_trace (which signal conditions matched)

      Exit path (stop hit / target reached / max-hold reached): close-proposal
      is mandatory per principles.md "Hard exit triggers". Emit
      ProposeAction(action_type="trading.close_position", ...) with:
        - ticker
        - exit_reason (stop_hit | target_reached | max_hold_reached)
        - position_state_trace (the substrate snapshot that triggered the close)

      Check 1 (signal attribution) must pass by construction for entries —
      every entry proposal is tied to a named signal. For exits, attribution
      is the original signal_id of the position being closed.

      If conditions don't warrant on the entry path, stand down with reasoning
      written to /workspace/review/decisions.md. **Silent stand-down on an
      exit trigger is forbidden** (per principles.md).
    display_name: "Trade Proposal"

  # ── pre-market-brief — daily pre-market deliverable ──────────────────────
  - slug: pre-market-brief
    # ADR-268: 30 min before RTH open, with overnight + pre-market context.
    # Previously "15 8 UTC" = 04:15 ET — too early, well before RTH.
    schedule: "@market_open - 30min"   # 09:00 ET
    mode: judgment
    prompt: |
      Produce the pre-market brief. Follow the spec at
      /workspace/specs/pre-market-brief.md. Save to
      /workspace/reports/pre-market-brief/{date}/output.md per CONVENTIONS
      topology. Compose to HTML automatically when section partials exist
      (ADR-262 D4).

      Sections required:
        - Signal State Summary (which signals may fire today)
        - Portfolio Exposure (current positions vs VaR budget — read
          /workspace/context/portfolio/positions/ + /workspace/context/portfolio/_account.yaml)
        - Decay Flags (signals with degrading expectancy)
        - Regime State (VIX bucket + trend regime)
        - Pending Proposals (anything in the Queue)

      Quantitative frame only — numbers, thresholds, named signals. No
      narrative beyond declared signals + declared risk metrics.
    display_name: "Pre-market brief"

  # ── weekly-performance-review — Sunday performance synthesis ─────────────
  - slug: weekly-performance-review
    schedule: "0 18 * * 0"
    mode: judgment
    prompt: |
      Produce the weekly performance review. Follow the spec at
      /workspace/specs/weekly-performance-review.md. Save to
      /workspace/reports/weekly-performance-review/{date}/output.md per
      CONVENTIONS topology.

      Read /workspace/context/trading/_money_truth.md — money-truth substrate
      from outcome-reconciliation. The frontmatter carries `by_signal` with
      per-signal {count, value_cents, wins, losses, rolling_7d/30d/90d}
      pre-computed by the reconciler. **Read those values directly; do not
      reconstruct per-signal expectancy from raw signal/{slug}.yaml files
      or from action_proposals.** The reconciler computes per-signal windows
      at fold time; your job is to surface and judge them.

      Compute additionally: Sharpe-lifetime per signal (you have the
      per-event time-series in _money_truth.md `events` array filtered by
      signal_id). Flag any signal whose decay guardrail (declared in
      /workspace/context/trading/_risk.md) was crossed.

      Sections required:
        - Portfolio Totals
        - Per-Signal Attribution (with expectancy + Sharpe)
        - Decay Flags (signals approaching or past guardrail)
        - Regime History (week's regime changes)
        - Quarterly-Audit Flags (signals candidate for retirement)
    display_name: "Weekly performance review"

  # ── quarterly-signal-audit — quarter-end signal-discipline ritual ─────────
  - slug: quarterly-signal-audit
    schedule: "0 18 31 3,6,9,12 *"
    mode: judgment
    prompt: |
      Produce the quarterly signal audit. Follow the spec at
      /workspace/specs/quarterly-signal-audit.md. Save to
      /workspace/reports/quarterly-signal-audit/{date}/output.md per
      CONVENTIONS topology.

      For every signal listed in `by_signal` (in _money_truth.md
      frontmatter):
        - Surface its count, value_cents, win rate (wins / count), and
          rolling 90d windows directly from the frontmatter — no
          reconstruction needed; the reconciler computed these at fold time.
        - For Sharpe + last-40-trade-expectancy, filter the `events` array
          in frontmatter to events where signal_id == this signal, then
          compute Sharpe over that filtered series.
        - Compare to declared baseline in
          /workspace/context/trading/_operator_profile.md.
        - If a signal crossed a retirement guardrail (from _risk.md), list
          it in Retirement Candidates with quantitative reasoning.

      Sections required:
        - Signal Performance Summary
        - Retirement Candidates (with evidence)
        - Retune Proposals
        - New Signal Research Candidates
        - Operator Decision Block (LEAVE EMPTY — operator fills in)

      You do NOT mutate /workspace/context/_shared/_operator_profile.md
      autonomously. The operator ratifies all signal-roster changes.
    display_name: "Quarterly signal audit"

  # ── outcome-reconciliation — daily money-truth reconcile ─────────────────
  # The reconciler is deterministic Python (services.outcomes.reconciler.
  # reconcile_user) that pulls fills from Alpaca, recovers signal attribution
  # via the client_order_id round-trip (P&L unification 2026-05-12), and
  # folds into _money_truth.md with by_signal bucketing. The recurrence
  # prompt is the wake-vehicle that triggers the reconciler through
  # invocation_dispatcher.
  - slug: outcome-reconciliation
    # ADR-268: 1h after RTH close — fills + clearing settled. Previously
    # "0 5 UTC" = 00:00 ET (midnight, multiple hours after close).
    schedule: "@market_close + 1h"   # 17:00 ET
    mode: judgment
    # ADR-269: deterministic reconciler pulls fills + orders from Alpaca;
    # specialist consultation requires market-data access for fill
    # verification.
    required_capabilities: [read_trading]
    prompt: |
      Reconcile yesterday's executed proposals against platform events.
      The deterministic reconciler in services.outcomes.reconciler.reconcile_user
      handles this end-to-end:

        1. Pulls executed orders + fills from the trading platform_connection
           since the last reconciliation timestamp.
        2. Recovers signal attribution via Alpaca's client_order_id field
           (our proposal.id round-trips through Alpaca per the P&L
           unification refactor; the reconciler reads it back and joins
           against action_proposals to extract signal_id from inputs).
        3. Folds outcomes into /workspace/context/trading/_money_truth.md
           — frontmatter rolling 7d/30d/90d, by_signal per-signal windows,
           by_action_type, by_provider; body narrative with per-signal
           attribution section. Schema in /workspace/specs/performance-rollup.md.
        4. Regenerates /workspace/context/_money_truth_summary.md as the
           cross-domain rollup the daily-update briefing reads.

      Stand down silently if there were no fills in the window.
    display_name: "Outcome Reconciliation"

  # ── morning-calibration — daily Reviewer calibration check ───────────────
  - slug: morning-calibration
    schedule: "0 6 * * *"
    mode: judgment
    prompt: |
      What you produce:
      - a calibration concern entry appended to /workspace/review/decisions.md
        when realized P&L diverges materially from declared edge
      - silent stand-down (no entry written) when no material divergence

      Calibrate against money-truth. Read
      /workspace/context/trading/_money_truth.md for the last 7d / 30d /
      90d windows (top-level rolling_*d) AND per-signal windows
      (`by_signal[signal_id].rolling_*d` in frontmatter). Compare realized
      expectancy to your declared edge in /workspace/review/principles.md
      both at the portfolio level AND per signal.

      If realized P&L diverges materially from your declared edge (e.g.
      realized expectancy negative when declared positive, or Sharpe
      drops below half of declared baseline), append a calibration concern
      entry to /workspace/review/decisions.md with:
        - The metric that diverged
        - The numerical gap
        - Whether you're proposing a posture change or just flagging

      If no material divergence, stand down silently. This recurrence is
      a guardrail — most days it produces no entry.
    display_name: "Morning Calibration"

  # ── morning-reflection — daily Reviewer self-reflection ──────────────────
  - slug: morning-reflection
    schedule: "0 7 * * *"
    mode: judgment
    prompt: |
      Reflect on yesterday's decisions against your principles. Read:
        - /workspace/review/decisions.md (last 7 days of verdicts)
        - /workspace/review/principles.md (your judgment framework)
        - /workspace/context/trading/_money_truth.md (money-truth)

      Identify patterns (read `by_signal` block in _money_truth.md
      frontmatter for per-signal pattern detection):
        - Repeated approve-then-loss patterns by signal or condition
          (compare by_signal[signal_id].losses / count ratios across signals)
        - Repeated reject-then-would-have-won patterns (false negatives)
        - Drift between stated principles and actual approval thresholds
        - Per-signal expectancy decay (rolling_7d.value_cents diverging
          materially from rolling_90d.value_cents on the same signal)

      If a pattern warrants a principles adjustment, ProposeAction with
      change_type="update_principles", target_file="principles.md",
      new_content=<full revised principles.md>. Operator approves before
      it lands.

      Append a reflections.md entry summarizing what you saw today —
      even if no proposal. The reflection log is your developmental
      record over time.
    display_name: "Morning Reflection"

  # ── proposal-cleanup — archive stale proposals ───────────────────────────
  - slug: proposal-cleanup
    schedule: "0 4 * * *"
    mode: judgment
    prompt: |
      Archive action_proposals rows that have been pending review for
      more than 7 days without operator action. Use UpdateContext with
      target="proposal" to mark them archived (revision log preserves
      history per ADR-209).

      For each archived proposal, append one line to
      /workspace/review/decisions.md noting the auto-archive with the
      proposal's original action_type and rationale.

      This is housekeeping — runs silently most days. Stand down if zero
      proposals are stale.
    display_name: "Proposal Cleanup"

  # ── narrative-digest — daily activity rollup for compact index ───────────
  - slug: narrative-digest
    schedule: "0 3 * * *"
    mode: judgment
    prompt: |
      Roll up non-conversation narrative events from the last 24h
      (reviewer verdicts, agent runs, system events) into
      /workspace/memory/recent.md.

      Group by Identity (reviewer / agent / external / system) and
      summarize material entries first. The output feeds the compact
      index per ADR-159 + ADR-221, so the operator's chat session reads
      see fresh activity context with low token cost.

      Use ListFiles + ReadFile on the narrative substrate; do NOT call
      DispatchSpecialist (this is an in-loop summarization task).
    display_name: "Narrative Digest"
