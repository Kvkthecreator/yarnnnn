# ADR-231 D3: domain accumulation recurrence declarations.
# Multi-decl file. Each entry is one recurring invocation against this domain.
# Forked into operator's /workspace/context/trading/_recurring.yaml at
# activation per ADR-226. The scheduler walks these on every tick.

recurrences:
  # ADR-253 D4: reclassified from accumulation (LLM) to maintenance (deterministic Python).
  # Saves ~$1.50/run. track-universe runs in ~2-5s at zero token cost.
  - slug: track-universe
    executor: services.back_office.trading_universe_tracker
    schedule: "0 8,11,15 * * 1-5"   # 08:00, 11:30, 15:45 ET (weekday-only)
    shape: maintenance
    paused: false
    display_name: "Universe Tracker"
    note: "Fetches Alpaca bars, computes SMA/RSI/ATR/volume, writes {ticker}.md. Zero LLM."

  # ADR-253 D4: reclassified from accumulation (LLM) to maintenance (deterministic Python).
  # Saves ~$0.80/run. signal-evaluation runs in milliseconds at zero token cost.
  # Fires trade-proposal invocation when a signal triggers.
  # Writes _signal_trigger.flag — Reviewer heartbeat_turn() fires after completion (ADR-253 D5).
  - slug: signal-evaluation
    executor: services.back_office.trading_signal_evaluator
    schedule: "5 8 * * 1-5"   # 08:05 ET weekdays
    shape: maintenance
    paused: false
    display_name: "Signal Evaluator"
    note: "Evaluates declared signals (boolean rules from _operator_profile.md). Fires trade-proposal on trigger. Zero LLM."
